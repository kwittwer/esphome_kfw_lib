substitutions:
  device_name: raffstore
  friendly_name: Raffstore
  channel_1_name: Switch 1
  channel_2_name: Switch 2
  max_temp: "70.0" # °C
  restore_mode: RESTORE_DEFAULT_OFF
  # Cover
  cover_id: raffstore
  cover_friendly_name: Raffstore
  switch_up_id: shelly_relay_1
  switch_down_id: shelly_relay_2
  power_up_sensor_id: channel_1_power
  power_down_sensor_id: channel_2_power

esphome:
  name: ${device_name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

esp32:
  variant: esp32c3
  flash_size: 8MB
  framework:
    type: esp-idf
    # platform_version: 6.4.0  # Erzwingt eine stabile Plattformversion
    # version: 5.1.1           # Nutzt eine für den C3 optimierte IDF-Version
    # # version: recommended
    # sdkconfig_options:
    #   COMPILER_OPTIMIZATION_SIZE: n

web_server:
  port: 80
logger:

api:
  encryption:
    key: !secret api_enc

ota:
  - platform: esphome
    password: !secret ota_pwd

wifi:
  id: wifi_main
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name}"
    password: !secret ap_pwd

captive_portal:

i2c:
  sda: GPIO6
  scl: GPIO7

sensor:
  - platform: ade7953_i2c
    irq_pin: GPIO1
    voltage:
      name: "Voltage"
      id: voltage
      icon: mdi:alpha-v-circle-outline
      device_class: voltage
    frequency:
      name: "Frequency"
      id: frequency
      accuracy_decimals: 2
      icon: mdi:cosine-wave
      device_class: frequency
    current_a:
      name: ${channel_1_name} Current
      id: channel_1_current
      icon: mdi:alpha-a-circle-outline
      device_class: current
    current_b:
      name: ${channel_2_name} Current
      id: channel_2_current
      icon: mdi:alpha-a-circle-outline
      device_class: current
    active_power_a:
      name: ${channel_1_name} Power
      id: channel_1_power
      icon: mdi:power
      device_class: power
      filters:
        - multiply: -1
    active_power_b:
      name: ${channel_2_name} Power
      id: channel_2_power
      icon: mdi:power
      device_class: power
      filters:
        - multiply: -1
    update_interval: 500ms

  - platform: ntc
    sensor: temp_resistance_reading
    name: "Temperature"
    id: temperature
    icon: "mdi:thermometer"
    calibration:
      b_constant: 3350
      reference_resistance: 10kOhm
      reference_temperature: 298.15K
    on_value:
      then:
        - if:
            condition:
              - sensor.in_range:
                  id: temperature
                  above: ${max_temp}
            then:
              - switch.turn_off:
                  id: shelly_relay_1
              - switch.turn_off:
                  id: shelly_relay_2
              - logger.log: "Switch turned off because temperature exceeded ${max_temp}°C"
              - homeassistant.service:
                  service: persistent_notification.create
                  data:
                    title: Message from ${device_name}
                  data_template:
                    message: Switch turned off because temperature exceeded ${max_temp}°C

    on_value_range:
      - above: ${max_temp}
        then:
          - logger.log: "Temperature exceeded ${max_temp}°C"

  - platform: resistance
    id: temp_resistance_reading
    sensor: temp_analog_reading
    configuration: DOWNSTREAM
    resistor: 32kOhm

  - platform: adc
    id: temp_analog_reading
    pin: 4

switch:
  - platform: gpio
    id: alive_led
    internal: true
    pin:
      number: 2
      inverted: true
      ignore_strapping_warning: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: shelly_relay_1
    name: ${channel_1_name} relay
    pin:
      number: 5
      mode:
        output: true
    icon: "mdi:electric-switch"
    restore_mode: ${restore_mode}

  - platform: gpio
    id: shelly_relay_2
    name: ${channel_2_name} relay
    pin:
      number: 3
      mode:
        output: true
    icon: "mdi:electric-switch"
    restore_mode: ${restore_mode}

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO18
    name: ${channel_1_name} input
    id: channel1_input
    filters:
      - delayed_on_off: 50ms
    on_state:
      then:
        - logger.log: ${device_name} Switch State Changed.
        - if:
            condition:
              binary_sensor.is_on: channel1_input
            then:
              - switch.turn_on: shelly_relay_1
            else:
              - switch.turn_off: shelly_relay_1

  - platform: gpio
    pin:
      number: GPIO10
    name: ${channel_2_name} input
    id: channel2_input
    filters:
      - delayed_on_off: 50ms
    on_state:
      then:
        - logger.log: ${device_name} Switch State Changed.
        - if:
            condition:
              binary_sensor.is_on: channel2_input
            then:
              - switch.turn_on: shelly_relay_2
            else:
              - switch.turn_off: shelly_relay_2

  - platform: gpio
    name: "Reset Button"
    pin:
      number: 19
      inverted: yes
      mode:
        input: true
        pullup: true
    on_multi_click:
      - timing:
          - ON for at least 5s
        then:
          - logger.log: "Reset Button long press erkannt: starte WLAN-Provisioning (Fallback-AP)"
          - wifi.configure:
              ssid: "__KFW_INVALID__"
              password: "__KFW_INVALID__"
              save: false
              timeout: 10s
          - wait_until:
              condition:
                wifi.ap_active:
              timeout: 30s
          - if:
              condition:
                wifi.ap_active:
              then:
                - logger.log: "Fallback AP aktiv. Verbinde dich mit dem AP und öffne http://192.168.4.1"
              else:
                - logger.log: "Fallback AP wurde nicht aktiviert (Gerät evtl. wieder im WLAN verbunden)."

interval:
  - interval: 10s
    then:
      - switch.turn_on: alive_led
      - delay: 1s
      - switch.turn_off: alive_led

packages:
  cover: !include
    file: cover.yaml
    vars:
      cover_id: ${cover_id}
      cover_friendly_name: ${cover_friendly_name}
      switch_up_id: ${switch_up_id}
      switch_down_id: ${switch_down_id}
      power_up_sensor_id: ${power_up_sensor_id}
      power_down_sensor_id: ${power_down_sensor_id}
