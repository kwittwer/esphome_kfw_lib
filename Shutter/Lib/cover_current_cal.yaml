# cover_current_cal.yaml
# Optionales Add-on zu cover_interlock.yaml / cover.yaml
#
# Fügt folgende Features hinzu:
#   - Automatische Endanschlag-Erkennung via Stromsensor (immer aktiv, Drift-Korrektur)
#   - Sicherheitsabschaltung bei Überstrom
#   - Kalibrierungs-Script für total_runtime (HA-Button "Kalibrierung starten")
#   - Separates Kalibrierungs-Script für Lamellen-Laufzeiten (HA-Button "Lamellen-Kalibrierung")
#
# Einbindung im Device-Config:
#   packages:
#     cover_base: !include
#       file: cover_interlock.yaml
#       vars:
#         cover_id: "jalousie1"
#         switch_dir_select_id: dir_relay
#         switch_move_id: enable_relay
#     cover_cal: !include
#       file: cover_current_cal.yaml
#       vars:
#         cover_id: "jalousie1"
#         switch_dir_select_id: dir_relay
#         switch_move_id: enable_relay
#         current_sensor_id: ade7953_current_a
#         current_endstop_default: "2.0"
#         current_overcurrent_default: "5.0"
#         current_tilt_transition_default: "0.8"

substitutions:
  cover_friendly_name: Jalousie
  cover_id: ""
  interval: "0.1"
  switch_dir_select_id: motor_dir
  switch_move_id: motor_enable
  current_sensor_id: current_sensor
  current_endstop_default: "2.0"       # A: Strom bei dem Endanschlag erkannt wird
  current_overcurrent_default: "5.0"   # A: Strom bei dem Sicherheitsabschaltung auslöst
  current_tilt_transition_default: "0.8" # A: Strom-Sprung der Jalousie-Fahrt (für Lamellen-Kalibrierung)
  current_min_run_time: "0.3"          # s: Mindestlaufzeit bevor Endanschlag-Erkennung aktiv

esphome:
  on_boot:
    then:
      - lambda: |-
          id(${cover_id}_endstop_threshold_input).publish_state(id(${cover_id}_endstop_threshold));
          id(${cover_id}_overcurrent_threshold_input).publish_state(id(${cover_id}_overcurrent_threshold));
          id(${cover_id}_tilt_transition_threshold_input).publish_state(id(${cover_id}_tilt_transition_threshold));

globals:
  - id: ${cover_id}_endstop_threshold
    type: float
    restore_value: yes
    initial_value: "${current_endstop_default}"

  - id: ${cover_id}_overcurrent_threshold
    type: float
    restore_value: yes
    initial_value: "${current_overcurrent_default}"

  - id: ${cover_id}_tilt_transition_threshold
    type: float
    restore_value: yes
    initial_value: "${current_tilt_transition_default}"

  - id: ${cover_id}_run_start_ms
    type: int
    restore_value: no
    initial_value: "0"

  - id: ${cover_id}_motor_was_running
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ${cover_id}_cal_start_ms
    type: int
    restore_value: no
    initial_value: "0"

  # Verhindert, dass der Endanschlag-Handler während der Kalibrierung feuert
  - id: ${cover_id}_cal_active
    type: bool
    restore_value: no
    initial_value: "false"

number:
  - platform: template
    name: "${cover_friendly_name} Endanschlag-Strom"
    id: ${cover_id}_endstop_threshold_input
    min_value: 0.1
    max_value: 20.0
    step: 0.1
    unit_of_measurement: "A"
    icon: "mdi:current-ac"
    mode: BOX
    entity_category: "config"
    optimistic: true
    on_value:
      then:
        - lambda: id(${cover_id}_endstop_threshold) = x;

  - platform: template
    name: "${cover_friendly_name} Überstrom-Schutz"
    id: ${cover_id}_overcurrent_threshold_input
    min_value: 0.5
    max_value: 30.0
    step: 0.5
    unit_of_measurement: "A"
    icon: "mdi:flash-alert"
    mode: BOX
    entity_category: "config"
    optimistic: true
    on_value:
      then:
        - lambda: id(${cover_id}_overcurrent_threshold) = x;

  - platform: template
    name: "${cover_friendly_name} Lamellen-Übergangsstrom"
    id: ${cover_id}_tilt_transition_threshold_input
    min_value: 0.1
    max_value: 10.0
    step: 0.1
    unit_of_measurement: "A"
    icon: "mdi:current-ac"
    mode: BOX
    entity_category: "config"
    optimistic: true
    on_value:
      then:
        - lambda: id(${cover_id}_tilt_transition_threshold) = x;

button:
  - platform: template
    name: "${cover_friendly_name} Kalibrierung starten"
    id: ${cover_id}_calibrate_button
    icon: "mdi:auto-fix"
    on_press:
      - script.execute: ${cover_id}_calibrate

  - platform: template
    name: "${cover_friendly_name} Lamellen-Kalibrierung"
    id: ${cover_id}_calibrate_tilt_button
    icon: "mdi:blinds"
    on_press:
      - script.execute: ${cover_id}_calibrate_tilt

interval:
  - interval: ${interval}s
    then:
      - lambda: |-
          // --- Motor-Start-Erkennung (Rising-Edge Detection) ---
          bool currently_running = id(${switch_move_id}).state;
          if (currently_running && !id(${cover_id}_motor_was_running)) {
            id(${cover_id}_run_start_ms) = (int)millis();
          }
          id(${cover_id}_motor_was_running) = currently_running;

          if (!currently_running) return;

          float current = id(${current_sensor_id}).state;
          float run_time_s = (millis() - (uint32_t)id(${cover_id}_run_start_ms)) / 1000.0f;

          // --- Sicherheitsabschaltung bei Überstrom (auch während Kalibrierung aktiv) ---
          if (current > id(${cover_id}_overcurrent_threshold)) {
            ESP_LOGW("cover_cal", "Überstrom: %.2fA > %.2fA - Notabschaltung!",
                     current, id(${cover_id}_overcurrent_threshold));
            id(${cover_id}_overcurrent_handler).execute();
            return;
          }

          // --- Endanschlag-Erkennung (nur im Normalbetrieb, nicht bei aktiver Kalibrierung) ---
          if (!id(${cover_id}_cal_active) &&
              current > id(${cover_id}_endstop_threshold) &&
              run_time_s > ${current_min_run_time}) {
            ESP_LOGI("cover_cal", "Endanschlag erkannt: %.2fA nach %.2fs", current, run_time_s);
            id(${cover_id}_endstop_handler).execute();
          }

script:
  # Wird bei Endanschlag im Normalbetrieb aufgerufen.
  # Stoppt laufende Scripts und setzt Position auf bekannten Endwert.
  - id: ${cover_id}_endstop_handler
    mode: single
    then:
      - script.stop: ${cover_id}_run_to_target_position
      - script.stop: ${cover_id}_run_to_target_tilt
      - script.execute: ${cover_id}_stop
      - lambda: |-
          if (id(${switch_dir_select_id}).state) {
            // Aufwärtsfahrt → obere Endposition
            id(${cover_id}_current_position) = 100.0f;
            id(${cover_id}_current_tilt) = 100.0f;
          } else {
            // Abwärtsfahrt → untere Endposition
            id(${cover_id}_current_position) = 0.0f;
            id(${cover_id}_current_tilt) = 0.0f;
          }
          id(${cover_id}_cover).position = id(${cover_id}_current_position) / 100.0f;
          id(${cover_id}_cover).tilt = id(${cover_id}_current_tilt) / 100.0f;
          id(${cover_id}_cover).publish_state();

  # Notabschaltung bei Überstrom. Bricht auch laufende Kalibrierungen ab.
  - id: ${cover_id}_overcurrent_handler
    mode: single
    then:
      - script.stop: ${cover_id}_run_to_target_position
      - script.stop: ${cover_id}_run_to_target_tilt
      - script.stop: ${cover_id}_calibrate
      - script.stop: ${cover_id}_calibrate_tilt
      - script.execute: ${cover_id}_stop
      - lambda: |-
          id(${cover_id}_cal_active) = false;

  # Kalibrierung für total_runtime.
  # Phase 1: Runterfahren bis Endanschlag (setzt Position auf 0).
  # Phase 2: Hochfahren bis Endanschlag, Laufzeit messen.
  # total_runtime = gemessene_Zeit - aktuelle 100_runtime (Lamellenzeit abziehen).
  - id: ${cover_id}_calibrate
    mode: single
    then:
      - lambda: |-
          id(${cover_id}_cal_active) = true;
          ESP_LOGI("cal", "Kalibrierung gestartet...");

      # --- Phase 1: Runterfahren bis Endanschlag ---
      - lambda: |-
          id(${cover_id}_run_start_ms) = (int)millis();
          id(${cover_id}_close).execute(0.0f);
      - wait_until:
          condition:
            lambda: |-
              float current = id(${current_sensor_id}).state;
              float run_time_s = (millis() - (uint32_t)id(${cover_id}_run_start_ms)) / 1000.0f;
              return current > id(${cover_id}_endstop_threshold) && run_time_s > ${current_min_run_time};
          timeout: !lambda |-
            return int((id(${cover_id}_total_runtime) + id(${cover_id}_100_runtime) + 10.0f) * 1000.0f);
      - switch.turn_off: ${switch_move_id}
      - lambda: |-
          id(${cover_id}_current_position) = 0.0f;
          id(${cover_id}_current_tilt) = 0.0f;
          id(${cover_id}_cover).position = 0.0f;
          id(${cover_id}_cover).tilt = 0.0f;
          id(${cover_id}_cover).publish_state();
          ESP_LOGI("cal", "Phase 1: Untere Endposition erreicht");
      - delay: 500ms

      # --- Phase 2: Hochfahren bis Endanschlag, Laufzeit messen ---
      - lambda: |-
          id(${cover_id}_cal_start_ms) = (int)millis();
          id(${cover_id}_run_start_ms) = (int)millis();
          id(${cover_id}_open).execute(0.0f);
      - wait_until:
          condition:
            lambda: |-
              float current = id(${current_sensor_id}).state;
              float run_time_s = (millis() - (uint32_t)id(${cover_id}_run_start_ms)) / 1000.0f;
              return current > id(${cover_id}_endstop_threshold) && run_time_s > ${current_min_run_time};
          timeout: !lambda |-
            return int((id(${cover_id}_total_runtime) + id(${cover_id}_100_runtime) + 10.0f) * 1000.0f);
      - switch.turn_off: ${switch_move_id}
      - lambda: |-
          float measured_s = (millis() - (uint32_t)id(${cover_id}_cal_start_ms)) / 1000.0f;
          float current_check = id(${current_sensor_id}).state;
          if (current_check > id(${cover_id}_endstop_threshold)) {
            // Endanschlag tatsächlich erreicht (kein Timeout)
            float new_total = measured_s - id(${cover_id}_100_runtime);
            if (new_total > 0.5f) {
              id(${cover_id}_total_runtime) = new_total;
              id(${cover_id}_total_runtime_input).publish_state(new_total);
              ESP_LOGI("cal", "Kalibrierung OK: total_runtime=%.2fs (gemessen: %.2fs, davon 100_runtime: %.2fs)",
                       new_total, measured_s, id(${cover_id}_100_runtime));
            } else {
              ESP_LOGW("cal", "Kalibrierung: Wert zu klein (%.2fs) - total_runtime unveraendert", new_total);
            }
          } else {
            ESP_LOGW("cal", "Kalibrierung: Timeout - kein Endanschlag erkannt, total_runtime unveraendert!");
          }
          id(${cover_id}_current_position) = 100.0f;
          id(${cover_id}_current_tilt) = 100.0f;
          id(${cover_id}_cover).position = 1.0f;
          id(${cover_id}_cover).tilt = 1.0f;
          id(${cover_id}_cover).publish_state();
          id(${cover_id}_cal_active) = false;

  # Manuelle Lamellen-Kalibrierung für 100_runtime und 50_runtime.
  # Erkennung: Stromanstieg wenn Jalousie-Hubmotor einsetzt (Lamellendrehung abgeschlossen).
  # Phase 1: Runterfahren bis Endanschlag.
  # Phase 2: Hochfahren bis Strom > tilt_transition_threshold → Zeitpunkt = 100_runtime.
  # 50_runtime wird automatisch auf 100_runtime / 2 gesetzt.
  - id: ${cover_id}_calibrate_tilt
    mode: single
    then:
      - lambda: |-
          id(${cover_id}_cal_active) = true;
          ESP_LOGI("cal_tilt", "Lamellen-Kalibrierung gestartet...");

      # --- Phase 1: Runterfahren bis Endanschlag ---
      - lambda: |-
          id(${cover_id}_run_start_ms) = (int)millis();
          id(${cover_id}_close).execute(0.0f);
      - wait_until:
          condition:
            lambda: |-
              float current = id(${current_sensor_id}).state;
              float run_time_s = (millis() - (uint32_t)id(${cover_id}_run_start_ms)) / 1000.0f;
              return current > id(${cover_id}_endstop_threshold) && run_time_s > ${current_min_run_time};
          timeout: !lambda |-
            return int((id(${cover_id}_total_runtime) + id(${cover_id}_100_runtime) + 10.0f) * 1000.0f);
      - switch.turn_off: ${switch_move_id}
      - lambda: |-
          id(${cover_id}_current_position) = 0.0f;
          id(${cover_id}_current_tilt) = 0.0f;
          id(${cover_id}_cover).position = 0.0f;
          id(${cover_id}_cover).tilt = 0.0f;
          id(${cover_id}_cover).publish_state();
          ESP_LOGI("cal_tilt", "Phase 1: Untere Endposition erreicht");
      - delay: 500ms

      # --- Phase 2: Hochfahren, Strom-Sprung bei Jalousie-Beginn erkennen ---
      - lambda: |-
          id(${cover_id}_cal_start_ms) = (int)millis();
          id(${cover_id}_run_start_ms) = (int)millis();
          id(${cover_id}_open).execute(0.0f);
      - wait_until:
          condition:
            lambda: |-
              float current = id(${current_sensor_id}).state;
              float run_time_s = (millis() - (uint32_t)id(${cover_id}_run_start_ms)) / 1000.0f;
              return current > id(${cover_id}_tilt_transition_threshold) && run_time_s > ${current_min_run_time};
          timeout: !lambda |-
            return int((id(${cover_id}_100_runtime) + 5.0f) * 1000.0f);
      - switch.turn_off: ${switch_move_id}
      - lambda: |-
          float measured_s = (millis() - (uint32_t)id(${cover_id}_cal_start_ms)) / 1000.0f;
          float current_check = id(${current_sensor_id}).state;
          if (current_check > id(${cover_id}_tilt_transition_threshold)) {
            if (measured_s > 0.1f && measured_s < 10.0f) {
              float new_50rt = measured_s / 2.0f;
              id(${cover_id}_100_runtime) = measured_s;
              id(${cover_id}_50_runtime) = new_50rt;
              id(${cover_id}_100_runtime_input).publish_state(measured_s);
              id(${cover_id}_50_runtime_input).publish_state(new_50rt);
              ESP_LOGI("cal_tilt", "Lamellen-Kalibrierung OK: 100_runtime=%.2fs, 50_runtime=%.2fs",
                       measured_s, new_50rt);
            } else {
              ESP_LOGW("cal_tilt", "Lamellen-Kalibrierung: Wert ausserhalb Bereich (%.2fs) - unveraendert", measured_s);
            }
          } else {
            ESP_LOGW("cal_tilt", "Lamellen-Kalibrierung: Timeout - kein Strom-Uebergang erkannt!");
          }
          // Lamellen offen (100%), Position unten (0%) - Kalibrierung endete mitten in der Aufwärtsfahrt
          id(${cover_id}_current_position) = 0.0f;
          id(${cover_id}_current_tilt) = 100.0f;
          id(${cover_id}_cover).position = 0.0f;
          id(${cover_id}_cover).tilt = 1.0f;
          id(${cover_id}_cover).publish_state();
          id(${cover_id}_cal_active) = false;
