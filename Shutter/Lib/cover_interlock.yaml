substitutions:
    cover_friendly_name: Jalousie
    cover_id: ""
    interval: 0.1
    switch_dir_select_id: relais_up
    switch_move_id: releis_down
    movement_unknown: 0
    movement_up: 1
    movement_down: 2

esphome:
  on_boot: 
    then:
      - lambda: |-
          id(${cover_id}_total_runtime_input).publish_state(id(${cover_id}_total_runtime));
          id(${cover_id}_50_runtime_input).publish_state(id(${cover_id}_50_runtime));
          id(${cover_id}_100_runtime_input).publish_state(id(${cover_id}_100_runtime));
      

globals:
  - id: ${cover_id}_current_position
    type: float
    restore_value: yes
    initial_value: '100.0'  # Startwert 100% (geöffnet)
  - id: ${cover_id}_current_tilt
    type: float
    restore_value: yes
    initial_value: '100.0'  # Startwert 100% (geöffnet)

  # Tracking für Bewegung
  - id: ${cover_id}_elapsed_time_up
    type: float
    initial_value: '0.0'  # Verstrichene Zeit beim Hochfahren
  
  - id: ${cover_id}_elapsed_time_down
    type: float
    initial_value: '0.0'  # Verstrichene Zeit beim Runterfahren
  # Verstrichene Zeit beim Runterfahren

  - id: ${cover_id}_target_position
    type: float
    restore_value: yes
    initial_value: '0.0'  # Zielposition für die Bewegung
    
  - id: ${cover_id}_target_tilt
    type: int
    restore_value: yes
    initial_value: '0'  # Zielposition für die Lamellenstellung

  - id: ${cover_id}_last_movement
    type: int
    restore_value: yes
    initial_value: '0'  # Zielposition für die Lamellenstellung

  - id: ${cover_id}_total_runtime
    type: float
    restore_value: yes
    initial_value: '1'  # Zielposition für die Lamellenstellung

  - id: ${cover_id}_50_runtime
    type: float
    restore_value: yes
    initial_value: '0.9'  # Zielposition für die Lamellenstellung

  - id: ${cover_id}_100_runtime
    type: float
    restore_value: yes
    initial_value: '1.6'  # Zielposition für die Lamellenstellung


number:
  - platform: template
    name: ${cover_friendly_name} Gesamtlaufzeit
    id: ${cover_id}_total_runtime_input
    min_value: 1.0 # Mindestens 100 ms
    max_value: 240.0 # Maximal 10 Minuten (600.000 ms)
    step: 0.1 # Schritte von 100 ms
    unit_of_measurement: "s"
    icon: "mdi:timer-sand"
    mode: BOX # Zeigt ein Eingabefeld in Home Assistant an
    # Bei Änderung des Wertes, diesen in der globalen Variable speichern
    entity_category: "config"
    optimistic: true
    on_value:
      then:
        - lambda: id(${cover_id}_total_runtime) = x;

  - platform: template
    name: ${cover_friendly_name} Lamellen 50% Laufzeit
    id: ${cover_id}_50_runtime_input
    min_value: 0.1 # Mindestens 100 ms
    max_value: 240.0 # Maximal 10 Minuten (600.000 ms)
    step: 0.1 # Schritte von 100 ms
    unit_of_measurement: "s"
    icon: "mdi:timer-sand"
    mode: BOX # Zeigt ein Eingabefeld in Home Assistant an
    # Bei Änderung des Wertes, diesen in der globalen Variable speichern
    entity_category: "config"
    optimistic: true
    on_value:
      then:
        - lambda: id(${cover_id}_50_runtime) = x;

  - platform: template
    name: ${cover_friendly_name} Lamellen 100% Laufzeit
    id: ${cover_id}_100_runtime_input
    min_value: 0.1 # Mindestens 100 ms
    max_value: 240.0 # Maximal 10 Minuten (600.000 ms)
    step: 0.1 # Schritte von 100 ms
    unit_of_measurement: "s"
    icon: "mdi:timer-sand"
    mode: BOX # Zeigt ein Eingabefeld in Home Assistant an
    # Bei Änderung des Wertes, diesen in der globalen Variable speichern
    entity_category: "config"
    optimistic: true
    on_value:
      then:
        - lambda: id(${cover_id}_100_runtime) = x;

cover:
  - platform: template
    name: "${cover_friendly_name}"
    id: ${cover_id}_cover
    assumed_state: true
    has_position: true
    # position: !lambda |-
    #   return id(${cover_id}_current_position);
    # tilt: !lambda |-
    #     return id(${cover_id}_current_tilt);

    open_action:
      - lambda: |-
          id(${cover_id}_open).execute(id(${cover_id}_total_runtime) + 1.0);
    close_action:
      - lambda: |-
          id(${cover_id}_close).execute(id(${cover_id}_total_runtime) + 1.0);
    stop_action:
      - lambda: |-
          id(${cover_id}_stop).execute();
    position_action:
      - lambda: |-
          float target_position = pos * 100.0; // Zielposition in Prozent
          id(${cover_id}_run_to_target_position).execute(target_position);

    tilt_action:
      - lambda: |-
          float target_tilt = tilt * 100.0; // Zielneigung in Prozent
          if(target_tilt > 66.0)
          {
            id(${cover_id}_target_tilt)=2;
            id(${cover_id}_run_to_target_tilt).execute(2);
          }
          else if ((target_tilt <= 66.0)&&(target_tilt > 33.0))
          {
            id(${cover_id}_target_tilt)=1;
            id(${cover_id}_run_to_target_tilt).execute(1);
          }
          else
          {
            id(${cover_id}_target_tilt)=0;
            id(${cover_id}_run_to_target_tilt).execute(0);
          }

    optimistic: true



interval:
  - interval: ${interval}s
    then:
      - lambda: |-
            if(id(${switch_move_id}).state)
            {
              if(id(${switch_dir_select_id}).state) //-> hochfahren
              {
                id(${cover_id}_elapsed_time_up) += ${interval};

                if(id(${cover_id}_current_tilt) < 100.0)
                {
                  id(${cover_id}_current_tilt) = id(${cover_id}_current_tilt) + ((100.0 / id(${cover_id}_100_runtime)) * ${interval});
                  if(id(${cover_id}_current_tilt) > 100.0)
                  {
                    id(${cover_id}_current_tilt) = 100.0;
                  }
                }
                else
                {
                  id(${cover_id}_current_position) = id(${cover_id}_current_position) + ((100.0 / id(${cover_id}_total_runtime)) * ${interval});
                }

              }
              else //-> runterfahren
              {
                id(${cover_id}_elapsed_time_down) += ${interval};
                if(id(${cover_id}_current_tilt) > 0.0)
                {
                  id(${cover_id}_current_tilt) = id(${cover_id}_current_tilt) - ((100.0 / id(${cover_id}_100_runtime)) * ${interval});
                  if(id(${cover_id}_current_tilt) < 0.0)
                  {
                    id(${cover_id}_current_tilt) = 0.0;
                  }
                }
                else
                {
                  id(${cover_id}_current_position) = id(${cover_id}_current_position) - ((100.0 / id(${cover_id}_total_runtime)) * ${interval});
                }
              }
            }


            if(id(${cover_id}_current_position) > 100.0)
            {
              id(${cover_id}_current_position) = 100.0;
            } else if(id(${cover_id}_current_position) < 0.0)
            {
              id(${cover_id}_current_position) = 0.0;
            } 

            if((id(${cover_id}_current_position) / 100.0) != id(${cover_id}_cover).position || id(${cover_id}_current_tilt) / 100.0 != id(${cover_id}_cover).tilt)
            {
              id(${cover_id}_cover).position = id(${cover_id}_current_position) / 100.0;
              id(${cover_id}_cover).tilt = id(${cover_id}_current_tilt) / 100.0;
              id(${cover_id}_cover).publish_state();
            }

script:
  - id: ${cover_id}_run_to_target_position
    mode: single
    parameters:
      target_position: float
    then:
      - lambda: |-
          if(target_position < id(${cover_id}_current_position))
          {
            id(${cover_id}_close).execute(0);
          }
          else if(target_position > id(${cover_id}_current_position))
          {
            id(${cover_id}_open).execute(0);
          }
          else
          {
            return; // Bereits in Zielposition
          }
      - wait_until: 
          condition:
            lambda: "return (id(${cover_id}_current_position) - target_position) < ((100.0 / id(${cover_id}_total_runtime)) * ${interval}) && (id(${cover_id}_current_position) - target_position) > -((100.0 / id(${cover_id}_total_runtime)) * ${interval});"
          timeout: !lambda "return int((id(${cover_id}_total_runtime)+1.0)*1000);"
      - script.execute: ${cover_id}_stop
      - lambda: |-
          id(${cover_id}_run_to_target_tilt).execute(id(${cover_id}_target_tilt));

  - id: ${cover_id}_run_to_target_tilt
    mode: single
    parameters:
      target_tilt: int
    then:
      - lambda: |-
          if(id(${cover_id}_current_tilt)> 1)
          {
            id(${cover_id}_close).execute(0);
          }
      - wait_until: 
          condition:
            lambda: "return (id(${cover_id}_current_tilt) < 1);"
      - script.execute: ${cover_id}_stop      
      # - if:
      #     condition:
      #       lambda: 'return target_tilt == 0 ;'
      #     then: 
      #       - lambda: |-
    
      - if:
          condition:
            lambda: 'return target_tilt == 1 ;'
          then:
            - lambda: |-
                id(${cover_id}_open).execute(id(${cover_id}_50_runtime));
      - if:
          condition:
            lambda: 'return target_tilt == 2 ;'
          then:
            - lambda: |-
                id(${cover_id}_open).execute(id(${cover_id}_100_runtime));

  - id: ${cover_id}_stop
    mode: single
    then:
      # - script.stop: ${cover_id}_clibration
      - script.stop: ${cover_id}_open
      - script.stop: ${cover_id}_close
      - switch.turn_off: ${switch_move_id} 

  - id: ${cover_id}_open
    parameters:
      open_time: float
    mode: single
    then:
      - switch.turn_on: ${switch_dir_select_id} 
      - if:
          condition:
            lambda: 'return open_time > 0.0 ;'
          then:
            - switch.turn_on: ${switch_move_id} 
            - delay: !lambda 'return int((open_time * 1000));' 
            - switch.turn_off: ${switch_move_id} 
          else:
            - switch.turn_on: ${switch_move_id} 


  - id: ${cover_id}_close
    parameters:
      close_time: float
    mode: single
    then:
      - switch.turn_off: ${switch_dir_select_id} 
      - if:
          condition:
            lambda: 'return close_time > 0.0 ;'
          then:
            - switch.turn_on: ${switch_move_id}
            - delay: !lambda 'return int((close_time * 1000));' 
            - switch.turn_off: ${switch_move_id}
          else:
            - switch.turn_on: ${switch_move_id}


  # - id: ${cover_id}_clibration
  #   mode: single
  #   then:
  #     - lambda: |-
  #         id(${cover_id}_open_for).execute(int(${uptime}*1000));
  