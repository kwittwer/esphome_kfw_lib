# ============================================
# Thermostat Template
# Parametrisiertes Template für einen einzelnen Thermostat
# 
# Vars (müssen in shared/Thermostate.yaml definiert sein):
#   - thermostat_id: eindeutige ID (z.B. 1, 2, etc.)
#   - thermostat_name: Anzeigename (z.B. "Wohnzimmer")
#   - thermostat_fallback_sensor: Fallback sensor ID (aus setup YAML)
#   - thermostat_fallback_humidity_sensor: Fallback humidity sensor ID
#   - thermostat_valve_switch: DO ID (z.B. "DO1")
#   - Thermostat_external_sensor_timeout: Timeout in Sekunden
#
# Primary Sensor: Wird NICHT hier definiert - wird automatisch aus
# dem Primary Sensor Link im Setup derived
# ============================================

climate:
  - platform: dummy_thermostat
    name: "${thermostat_name}"
    id: thermostat${thermostat_id}
    fallback_sensor: ${thermostat_fallback_sensor}
    sensor_timeout: ${Thermostat_external_sensor_timeout}
    fallback_humidity_sensor: ${thermostat_fallback_humidity_sensor}
    humidity_sensor_timeout: ${Thermostat_external_sensor_timeout}
    valve_switch: ${thermostat_valve_switch}
    valve_update_timeout: 300
    valve_control_enabled: !lambda |-
      return id(heating_master_switch).state && id(hw_master_sw).state;
    use_local_valve_control: !lambda |-
      return id(local_control_switch).state;
    heating_deadband: 0.5
    heating_overrun: 0.1
    visual:
      min_temperature: 15.0
      max_temperature: 30.0
      temperature_step:
        target_temperature: 0.5
        current_temperature: 0.1

binary_sensor:
  - platform: template
    name: "${thermostat_name} Fallback active - Temperature Sensor"
    id: t${thermostat_id}_fallback_temp_active
    entity_category: diagnostic
    lambda: |-
      return id(thermostat${thermostat_id}).is_using_fallback_temperature();

display:
  - id: !extend oled_display
    pages:
      - id: page_thermostat_${thermostat_id}
        lambda: |-
          auto thermostat = id(thermostat${thermostat_id});
          it.printf(0, 0, id(small), "Thermostat ${thermostat_id}");
          it.print(0, 11, id(tiny), "${thermostat_name}");
          it.line(0, 21, 127, 21);

          if (!isnan(thermostat->current_temperature)) {
            it.printf(0, 25, id(tiny), "Temp: %.1f C", thermostat->current_temperature);
          } else {
            it.print(0, 25, id(tiny), "Temp: n/a");
          }

          if (!isnan(thermostat->current_humidity)) {
            it.printf(64, 25, id(tiny), "Hum: %.1f%%", thermostat->current_humidity);
          } else {
            it.print(64, 25, id(tiny), "Hum: n/a");
          }

          it.printf(0, 37, id(tiny), "Soll: %.1f C", thermostat->target_temperature);
          it.printf(64, 37, id(tiny), "Valve: %s", thermostat->get_valve_state() ? "ON" : "OFF");

          it.printf(0, 49, id(tiny), "Fallback: %s", id(t${thermostat_id}_fallback_temp_active).state ? "ON" : "OFF");
          it.printf(0, 59, id(tiny), "Action: %d Mode: %d", (int)thermostat->action, (int)thermostat->mode);

api:
  services:
    - service: set_current_temperature_thermostat${thermostat_id}
      variables:
        wert: float
      then:
        - lambda: |-
            id(thermostat${thermostat_id}).set_current_temperature(wert);

    - service: set_current_humidity_thermostat${thermostat_id}
      variables:
        wert: float
      then:
        - lambda: |-
            id(thermostat${thermostat_id}).set_current_humidity(wert);

    - service: set_valve_state_thermostat${thermostat_id}
      variables:
        valve: bool
      then:
        - lambda: |-
            id(thermostat${thermostat_id}).set_valve_state(valve);

