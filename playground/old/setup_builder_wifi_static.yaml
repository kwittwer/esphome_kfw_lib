# ============================================
# ESPHome B16M - Device Builder Entry (WiFi mit statischer IP)
#
# This file is intended for ESPHome Device Builder import.
# Allows configuration of WiFi and static IP address through Dashboard substitutions.
#
# Beim Import werden diese Felder in der Dashboard-GUI als bearbeitbare Eingabefelder angezeigt:
#   - Device-Name (für ESPHome Dashboard)
#   - Friendly Name (Anzeigename)
#   - WLAN-SSID (Netzwerkname)
#   - WLAN-Passwort
#   - Statische IP-Adresse
#   - Gateway/Router-IP
#   - Subnet-Maske
#   - DNS-Server
# ============================================

substitutions:
  # ============================================
  # DEVICE CONFIGURATION (bearbeitbar in Dashboard GUI)
  # ============================================
  # Gerätekennzeichen (ohne Leerzeichen, nur Kleinbuchstaben, Zahlen, Bindestrich)
  device_name: "b16m-wifi-static"
  # Anzeigename im Home Assistant und ESPHome Dashboard
  friendly_name: "B16M WiFi (Statisch)"

  # ============================================
  # WLAN-KONFIGURATION (bearbeitbar in Dashboard GUI)
  # ============================================
  # WLAN-Netzwerkname (SSID)
  wifi_ssid: "CHANGE_ME_WIFI_SSID"
  # WLAN-Passwort
  wifi_password: "CHANGE_ME_WIFI_PASSWORD"
  # Fallback AP Name (wenn sich Gerät nicht mit WLAN verbinden kann)
  wifi_ap_ssid: "B16M Fallback AP"
  # Fallback AP Passwort
  wifi_ap_password: "CHANGE_ME_FALLBACK_AP_PASSWORD"

  # ============================================
  # NETZWERK - STATISCHE IP-KONFIGURATION (bearbeitbar in Dashboard GUI)
  # ============================================
  # Statische IP-Adresse des Geräts (z.B. 192.168.1.100)
  wifi_static_ip: "192.168.1.100"
  # Gateway/Router-IP (z.B. 192.168.1.1)
  wifi_gateway: "192.168.1.1"
  # Subnet-Maske (Standard: 255.255.255.0 für /24-Netzwerk)
  wifi_subnet: "255.255.255.0"
  # DNS-Server (z.B. 192.168.1.1 oder 8.8.8.8)
  wifi_dns: "192.168.1.1"

packages:
  b16m_application:
    url: https://github.com/kwittwer/esphome_kfw_lib
    ref: main
    refresh: 1d
    files:
      - path: B16M/platform/B16M_base.yaml
        vars:
          device_name: b16m-builder-wifi-static
          friendly_name: "B16M Builder WiFi (Static)"
          version: "2025.12.10.1"
      - path: B16M/packages/networking/net_wifi_static.yaml
        vars:
          wifi_ssid: ${wifi_ssid}
          wifi_password: ${wifi_password}
          wifi_ap_ssid: ${wifi_ap_ssid}
          wifi_ap_password: ${wifi_ap_password}
          static_ip: ${wifi_static_ip}
          gateway: ${wifi_gateway}
          subnet: ${wifi_subnet}
          dns: ${wifi_dns}
      - path: B16M/packages/sensors/ow_dht_slot.yaml
        vars:
          dht_pin: "40"
          dht_name: "Sensor1"
          dht_id: "T1"
          dht_update_interval: 10s
      - path: B16M/packages/sensors/ow_dht_slot.yaml
        vars:
          dht_pin: "15"
          dht_name: "Sensor2"
          dht_id: "T2"
          dht_update_interval: 10s
      - path: B16M/packages/sensors/ow_dht_slot.yaml
        vars:
          dht_pin: "48"
          dht_name: "Sensor3"
          dht_id: "T3"
          dht_update_interval: 10s
      - path: B16M/packages/sensors/ow_dht_slot.yaml
        vars:
          dht_pin: "47"
          dht_name: "Sensor4"
          dht_id: "T4"
          dht_update_interval: 10s
      - B16M/shared/Thermostate.yaml
      - path: B16M/packages/heating/thermostat_template.yaml
        vars:
          thermostat_id: 1
          thermostat_name: "Raum 1"
          thermostat_fallback_sensor: Sensor1_temperature
          thermostat_fallback_humidity_sensor: Sensor1_humidity
          thermostat_valve_switch: DO1
          Thermostat_external_sensor_timeout: "900"

dashboard_import:
  package_import_url: github://kwittwer/esphome_kfw_lib/B16M/application/setup_builder_wifi_static.yaml@main
  import_full_config: false

api:
  reboot_timeout: 6h

ota:
  - platform: esphome
