# ============================================
# PAGE BUTTON
# ============================================

binary_sensor:
  - platform: gpio
    pin: 
      number: GPIO0
      ignore_strapping_warning: true
    name: "Page Button"
    internal: true
    #interrupt_type: RISING
    on_press:
      then:
        - script.execute: next_page
        - script.execute: reset_timer

# ============================================
# SCRIPTS
# ============================================

script:
  - id: next_page
    mode: restart
    then:
      - display.page.show_next: B16M_display

  - id: reset_timer
    mode: restart
    then:
      - delay: 60s
      - display.page.show: mainpage

# ============================================
# DISPLAY
# ============================================
display:
  - platform: ssd1306_i2c
    i2c_id: bus_a
    model: "SSD1306 128x64"
    address: 0x3c
    id: B16M_display
    update_interval: 500ms
    
    pages:
    # ========================================
    # PAGE 1: Zeit & Status
    # ========================================
    - id: mainpage
      lambda: |- 
        // Header
        it.printf(64, 0, id(small), TextAlign::TOP_CENTER, "Time & Status");
        it.line(0, 14, 127, 14);
        
        // Zeit (groß)
        it.strftime(64, 30, id(large), TextAlign::CENTER, "%H:%M:%S", id(rtc_time).now());
        
        if (id(uptime_seconds).has_state()) { 
          // Uptime in Sekunden abrufen und in Ganzzahl umwandeln
          int total_seconds = (int)id(uptime_seconds).state;
          
          // Tage, Stunden, Minuten und Sekunden berechnen
          int days = total_seconds / (3600 * 24);
          int hours = (total_seconds % (3600 * 24)) / 3600;
          int minutes = (total_seconds % 3600) / 60;
          int seconds = total_seconds % 60;
          
          // Formatiert auf dem Display ausgeben
          it.printf(64, 52, id(small), TextAlign::CENTER, "up: %dd %02d:%02d:%02d", days, hours, minutes, seconds);
        }

    # ========================================
    # PAGE 2: Icons Demo
    # ========================================
    # - id: page2
    #   lambda: |-
    #     // Header
    #     it.printf(64, 0, id(bold), TextAlign::TOP_CENTER, "ICONS");
    #     it.line(0, 11, 127, 11);
        
    #     // Row 1
    #     it.print(5, 20, id(icon), "\U000F02D1");   // heart
    #     it.print(45, 20, id(icon), "\U000F1A86");  // temperature-celsius
    #     it.print(85, 20, id(icon), "\U000F0159");  // alert
        
    #     // Row 2
    #     it.print(5, 40, id(icon), "\U000F012F");   // circle-blank
    #     it.print(45, 40, id(icon), "\U000F0133");  // circle-marked
    #     it.print(85, 40, id(icon), "\U000F012E");  // checkbox-blank
        
    #     // Row 3
    #     it.print(5, 60, id(icon), "\U000F0132");   // checkbox-marked
    #     it.print(45, 60, id(icon), "\U000F0319");  // lan-disconnect
    #     it.print(85, 60, id(icon), "\U000F0318");  // lan-connect
    - id: overview
      lambda: |-
        it.print(25, 0, id(small), "Uebersicht");
        it.line(0, 14, 127, 14);
        
        // Aktuelle Temperatur (groß, links)
        
        if (api::global_api_server->is_connected()) {
          it.print(0, 20, id(small), "HA: OK");  // thermometer
          it.printf(45, 20, id(icon), "\U000F0318");// lan-connect
        } else {
          it.print(0, 20, id(small), "HA: ERROR");  // thermometer
          it.print(70, 20, id(icon), "\U000F0319");// lan-disconnect
        }

        it.print(0, 35, id(icon), "\U000F059D");  // # weather-windy
        it.printf(25, 35, id(small), "%.1f m/s", id(wind_speed).state);// lan-connect


        // Zieltemperatur (rechts oben)
        // it.print(60, 20, id(icon), "\U000F04FE");  // target icon
        // it.printf(75, 20, id(small), "%.1f°C", thermostat->target_temperature);
        


    # ========================================
    # PAGE 3: Thermostat Wohnzimmer
    # ========================================
    - id: Thermo1
      lambda: |-
        auto thermostat = id(thermostat1);
        
        // Header mit Icon
        //it.print(0, 0, id(icon), "\U000F1A86");  // temperature icon
        it.print(25, 0, id(small), "Raum1");
        it.line(0, 14, 127, 14);
        
        // Aktuelle Temperatur (groß, links)
        it.print(0, 20, id(icon), "\U000F050F");  // thermometer
        if (!isnan(thermostat->current_temperature)) {
          it.printf(15, 20, id(small), "%.1f°C", thermostat->current_temperature);
        } else {
          it.print(15, 20, id(small), "--.-");
        }
        
        // Zieltemperatur (rechts oben)
        it.print(60, 20, id(icon), "\U000F04FE");  // target icon
        it.printf(75, 20, id(small), "%.1f°C", thermostat->target_temperature);
        
        // Action State mit Icon (Mitte)
        int y_pos = 35;
        switch (thermostat->action) {
          case climate::CLIMATE_ACTION_OFF:
            it.print(0, y_pos, id(icon), "\U000F0902");  // power-off
            it.print(15, y_pos - 3, id(tiny), "AUS");
            break;
          case climate::CLIMATE_ACTION_IDLE:
            it.print(0, y_pos, id(icon), "\U000F03E4");  // pause-circle
            it.print(15, y_pos - 3, id(tiny), "IDLE");
            break;
          case climate::CLIMATE_ACTION_HEATING:
            it.print(0, y_pos, id(icon), "\U000F0238");  // fire
            it.print(15, y_pos - 3, id(tiny), "HEIZE");
            break;
          case climate::CLIMATE_ACTION_COOLING:
            it.print(0, y_pos, id(icon), "\U000F0717");  // snowflake
            it.print(15, y_pos - 3, id(tiny), "KUEHLE");
            break;
          default:
            it.print(0, y_pos, id(small), "?");
        }
        
        // Luftfeuchtigkeit mit Icon (unten)
        if (!isnan(thermostat->current_humidity)) {
          it.print(60, y_pos, id(icon), "\U000F058E");  // water-percent
          it.printf(75, y_pos, id(small), "%.0f%%", thermostat->current_humidity);
        }
        
        // Modus-Anzeige (ganz unten)
        std::string mode_str;
        switch (thermostat->mode) {
          case climate::CLIMATE_MODE_OFF:
            mode_str = "AUS";
            break;
          case climate::CLIMATE_MODE_HEAT:
            mode_str = "HEIZEN";
            break;
          case climate::CLIMATE_MODE_COOL:
            mode_str = "KUEHLEN";
            break;
          case climate::CLIMATE_MODE_HEAT_COOL:
            mode_str = "AUTO";
            break;
          default:
