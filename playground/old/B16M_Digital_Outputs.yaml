    name: "DO1"
    id: DO1
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 0
      mode: OUTPUT
      inverted: true

  - platform: gpio
    name: "DO2"
    id: DO2
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 1
