# ============================================
# PACKAGES
# ============================================
packages:
  base: !include
    file: B16M_components/B16M_base.yaml
    vars:
      device_name: b16m
      friendly_name: "B16M Panel"
      version: "2025.12.10.1"
  # Ethernet W5500 mit DHCP (Standard B16M-Hardware)
  # Alternativen: net_ethernet_static.yaml | net_wifi.yaml | net_wifi_static.yaml
  network: !include B16M_components/net_ethernet.yaml

  # Modbus TCP (Master + Slave, interner Loopback standardmäßig aktiv)
  # modbus: !include B16M_components/B16M_Modbus_TCP.yaml

  # Sensor-Slots: Slot 1 als Dallas Bus mit 16 Sensoren, Slot 2-3 als DHT, Slot 4 als DHT
  sensor_slot_1: !include
    file: B16M_components/ow_dallas_bus.yaml
    vars:
      dallas_bus_id: ow_slot_1
      dallas_pin: "47"
  sensor_slot_2: !include
    file: B16M_components/ow_dht_slot.yaml
    vars:
      dht_pin: "15"
      dht_name: "Temp1"
      dht_id: "T2"
      dht_update_interval: 1s
  sensor_slot_3: !include
    file: B16M_components/ow_dht_slot.yaml
    vars:
      dht_pin: "48"
      dht_name: "Temp2"
      dht_id: "T3"
      dht_update_interval: 10s

  sensor_slot_4: !include
    file: B16M_components/ow_dht_slot.yaml
    vars:
      dht_pin: "40"
      dht_name: "Temp3"
      dht_id: "T4"
      dht_update_interval: 10s

  dallas_slot_1_01: !include
    file: B16M_components/ow_dallas_sensor.yaml
    vars:
      one_wire_id: ow_slot_1
      dallas_address: 0x59072463bba3b028
      dallas_sensor_name: "Vorlauf"
      dallas_sensor_id: dallas_01_vorlauf
      dallas_update_interval: 10s
  dallas_slot_1_02: !include
    file: B16M_components/ow_dallas_sensor.yaml
