      thermostat_fallback_sensor: Temp2_temperature
      thermostat_fallback_humidity_sensor: Temp2_humidity
      thermostat_valve_switch: DO4
      Thermostat_external_sensor_timeout: "900"

  heating_power_1: !include
    file: B16M_components/heating_power_template.yaml
    vars:
      heating_power_index: 1
      heating_power_name: "Heizkreis 1"
      heating_power_supply_sensor_id: dallas_01_vorlauf
      heating_power_return_sensor_id: dallas_02_ruecklauf1
      heating_power_flow_initial_l_min: 5.0

  heating_power_2: !include
    file: B16M_components/heating_power_template.yaml
    vars:
      heating_power_index: 2
      heating_power_name: "Heizkreis 2"
      heating_power_supply_sensor_id: dallas_01_vorlauf
      heating_power_return_sensor_id: dallas_04_ruecklauf3
      heating_power_flow_initial_l_min: 3.5

# ============================================
# API & OTA
# ============================================
api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 6h

ota:
  - platform: esphome
    password: !secret ota_pwd
