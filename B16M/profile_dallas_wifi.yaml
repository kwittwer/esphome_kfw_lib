# ============================================
# B16M Profil B – Dallas One-Wire Bus, WiFi
#
# Passend wenn: Slot 4 (GPIO47) als Dallas Bus genutzt wird
#               und das Geraet per WLAN verbunden ist.
#               Bis zu 16 Dallas-Sensoren auf einem Bus moeglich.
#
# MUSS angepasst werden:
#   device_name, friendly_name, wifi_ssid, wifi_password,
#   api.encryption.key, ota.password
#
# Pro Sensor:  dallas_address (aus ESPHome One-Wire Scanner auslesen),
#              sensor_name (beliebig), optional update_interval
#
# Sensor-Adressen ermitteln:
#   1. Dieses Profil flashen (ohne Adressen)
#   2. In ESPHome Logs die gefundenen One-Wire Adressen ablesen
#   3. Adressen einsetzen und erneut flashen
# ============================================

substitutions:
  # ---- Geraet -------------------------------------------------------
  device_name: b16m-dallas-wifi           # Aendern
  friendly_name: "B16M Dallas WiFi"       # Aendern

  # ---- Netzwerk -----------------------------------------------------
  wifi_ssid: "WLAN-Name-hier"             # Aendern
  wifi_password: "WLAN-Passwort-hier"     # Aendern

packages:
  base: !include
    file: B16M_components/B16M_base.yaml
    vars:
      device_name: ${device_name}
      friendly_name: ${friendly_name}

  network: !include
    file: B16M_components/net_wifi.yaml
    vars:
      wifi_ssid: ${wifi_ssid}
      wifi_password: ${wifi_password}

  # Dallas Bus auf Slot 4 (GPIO47) – Pin nicht aendern
  sensor_slot_4: !include
    file: B16M_components/ow_dallas_bus.yaml
    vars:
      dallas_bus_id: ow_bus_1
      dallas_pin: "47"

  # ---- Dallas Sensoren (Adresse + Name anpassen) --------------------
  # Adressen aus den ESPHome Logs kopieren (nach erstem Flash ohne Adressen)

  dallas_1: !include
    file: B16M_components/ow_dallas_sensor.yaml
    vars:
      one_wire_id: ow_bus_1
      dallas_address: 0x0000000000000000   # ERSETZEN: Adresse aus Logs
      dallas_sensor_name: "Sensor 1"       # Aendern: z.B. "Vorlauf", "Rücklauf"
      dallas_sensor_id: dallas_s1
      dallas_update_interval: 10s

  dallas_2: !include
    file: B16M_components/ow_dallas_sensor.yaml
    vars:
      one_wire_id: ow_bus_1
      dallas_address: 0x0000000000000000   # ERSETZEN
      dallas_sensor_name: "Sensor 2"
      dallas_sensor_id: dallas_s2
      dallas_update_interval: 10s

  # Weitere Sensoren bei Bedarf: Abschnitt kopieren (dallas_3, dallas_4, ...  bis dallas_16)
  # dallas_3: !include
  #   file: B16M_components/ow_dallas_sensor.yaml
  #   vars:
  #     one_wire_id: ow_bus_1
  #     dallas_address: 0x0000000000000000
  #     dallas_sensor_name: "Sensor 3"
  #     dallas_sensor_id: dallas_s3
  #     dallas_update_interval: 10s

  thermostat_base: !include Peripherie/Thermostate.yaml

  thermostat1: !include
    file: B16M_components/thermostat_template.yaml
    vars:
      thermostat_id: 1
      thermostat_name: "Thermostat 1"             # Aendern
      thermostat_fallback_sensor: dallas_s1        # Aendern: dallas_sensor_id des gewuenschten Sensors
      thermostat_fallback_humidity_sensor: dallas_s1  # Dallas hat keine Feuchte – ggf. einen DHT-Slot verwenden
      thermostat_valve_switch: DO1                 # Aendern: DO1..DO16
      Thermostat_external_sensor_timeout: "900"

dashboard_import:
  package_import_url: github://kwittwer/esphome_kfw_lib/B16M/profile_dallas_wifi.yaml@main
  import_full_config: false

api:
  reboot_timeout: 6h

ota:
  - platform: esphome
