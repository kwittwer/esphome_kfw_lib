# ============================================
# ESPHome B16M - Device Builder Entry (Ethernet with DHCP)
#
# This file is intended for ESPHome Device Builder import.
# It keeps the configuration minimal and editable while
# reusing package templates directly from GitHub.
#
# Beim Import werden diese Felder in der Dashboard-GUI als bearbeitbare Eingabefelder angezeigt:
#   - Device-Name (für ESPHome Dashboard)
#   - Friendly Name (Anzeigename)
#
# For static IP configuration, use setup_builder_ethernet_static.yaml instead.
#
# Dashboard Substitutionen:
#   - device_name: Gerätekennzeichen für ESPHome Dashboard
#   - friendly_name: Anzeigename in Home Assistant
# ============================================

substitutions:
  # ============================================
  # DEVICE CONFIGURATION (bearbeitbar in Dashboard GUI)
  # ============================================
  # Gerätekennzeichen (ohne Leerzeichen, nur Kleinbuchstaben, Zahlen, Bindestrich)
  device_name: "b16m-eth"
  # Anzeigename im Home Assistant und ESPHome Dashboard
  friendly_name: "B16M Ethernet"

packages:
  b16m_application:
    url: https://github.com/kwittwer/esphome_kfw_lib
    ref: main
    refresh: 0s
    files:
      - path: B16M/platform/B16M_base.yaml
        vars:
          device_name: ${device_name}
          friendly_name: ${friendly_name}
          version: "2025.12.10.1"
      - B16M/packages/networking/net_ethernet.yaml
      - path: B16M/packages/sensors/ow_dht_slot.yaml
        vars:
          dht_pin: "40"
          dht_name: "Sensor1"
          dht_id: "T1"
          dht_update_interval: 10s
      - path: B16M/packages/sensors/ow_dht_slot.yaml
        vars:
          dht_pin: "15"
          dht_name: "Sensor2"
          dht_id: "T2"
          dht_update_interval: 10s
      - path: B16M/packages/sensors/ow_dht_slot.yaml
        vars:
          dht_pin: "48"
          dht_name: "Sensor3"
          dht_id: "T3"
          dht_update_interval: 10s
      - path: B16M/packages/sensors/ow_dht_slot.yaml
        vars:
          dht_pin: "47"
          dht_name: "Sensor4"
          dht_id: "T4"
          dht_update_interval: 10s
      - B16M/shared/Thermostate.yaml
      - path: B16M/packages/heating/thermostat_template.yaml
        vars:
          thermostat_id: 1
          thermostat_name: "Raum 1"
          thermostat_fallback_sensor: Sensor1_temperature
          thermostat_fallback_humidity_sensor: Sensor1_humidity
          thermostat_valve_switch: DO1
          Thermostat_external_sensor_timeout: "900"

dashboard_import:
  package_import_url: github://kwittwer/esphome_kfw_lib/B16M/application/setup_builder_ethernet.yaml@main
  import_full_config: false

api:
  reboot_timeout: 6h

ota:
  - platform: esphome