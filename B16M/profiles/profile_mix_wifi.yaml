# ============================================
# B16M Profil C â€“ Gemischt: 3x DHT + Dallas Bus, WiFi
#
# Passend wenn: Slots 1-3 mit DHT-Sensoren belegt sind,
#               Slot 4 (GPIO47) als Dallas One-Wire Bus genutzt wird
#               und das Geraet per WLAN verbunden ist.
#
# MUSS angepasst werden:
#   device_name, friendly_name, wifi_ssid, wifi_password,
#   api.encryption.key, ota.password
#
# Sensor-Adressen fuer Dallas ermitteln:
#   1. Dieses Profil flashen (Adressen auf 0x000... lassen)
#   2. In ESPHome Logs die gefundenen One-Wire Adressen ablesen
#   3. Adressen einsetzen und erneut flashen
# ============================================

substitutions:
  # ---- Geraet -------------------------------------------------------
  device_name: b16m-mix-wifi              # Aendern
  friendly_name: "B16M Mix WiFi"          # Aendern

  # ---- Netzwerk -----------------------------------------------------
  wifi_ssid: "WLAN-Name-hier"             # Aendern
  wifi_password: "WLAN-Passwort-hier"     # Aendern

  # ---- DHT Sensor-Namen und IDs (Slots 1-3) ------------------------
  # slot_name: Anzeigename in HA (Leerzeichen erlaubt)
  # slot_id:   Technische ID (NUR Buchstaben, Zahlen, Unterstrich)
  slot1_name: "Sensor Slot 1"             # z.B. "Aussen"
  slot1_id: "slot1"                       # z.B. "aussen"
  slot2_name: "Sensor Slot 2"
  slot2_id: "slot2"
  slot3_name: "Sensor Slot 3"
  slot3_id: "slot3"

  slot1_interval: "10s"
  slot2_interval: "10s"
  slot3_interval: "10s"

packages:
  base: !include
    file: ../platform/B16M_base.yaml
    vars:
      device_name: ${device_name}
      friendly_name: ${friendly_name}

  network: !include
    file: ../packages/networking/net_wifi.yaml
    vars:
      wifi_ssid: ${wifi_ssid}
      wifi_password: ${wifi_password}

  sensor_slot_1: !include
    file: ../packages/sensors/ow_dht_slot.yaml
    vars:
      dht_pin: "40"
      dht_name: ${slot1_id}
      dht_id: T1
      dht_update_interval: ${slot1_interval}

  sensor_slot_2: !include
    file: ../packages/sensors/ow_dht_slot.yaml
    vars:
      dht_pin: "15"
      dht_name: ${slot2_id}
      dht_id: T2
      dht_update_interval: ${slot2_interval}

  sensor_slot_3: !include
    file: ../packages/sensors/ow_dht_slot.yaml
    vars:
      dht_pin: "48"
      dht_name: ${slot3_id}
      dht_id: T3
      dht_update_interval: ${slot3_interval}

  # Dallas Bus auf Slot 4 (GPIO47) â€“ Pin nicht aendern
  sensor_slot_4: !include
    file: ../packages/sensors/ow_dallas_bus.yaml
    vars:
      dallas_bus_id: ow_bus_1
      dallas_pin: "47"

  # ---- Dallas Sensoren (Adresse + Name anpassen) --------------------
  dallas_1: !include
    file: ../packages/sensors/ow_dallas_sensor.yaml
    vars:
      one_wire_id: ow_bus_1
      dallas_address: 0x0000000000000000   # ERSETZEN: Adresse aus Logs
      dallas_sensor_name: "Dallas Sensor 1"
      dallas_sensor_id: dallas_s1
      dallas_update_interval: 10s

  dallas_2: !include
    file: ../packages/sensors/ow_dallas_sensor.yaml
    vars:
      one_wire_id: ow_bus_1
      dallas_address: 0x0000000000000000   # ERSETZEN
      dallas_sensor_name: "Dallas Sensor 2"
      dallas_sensor_id: dallas_s2
      dallas_update_interval: 10s

  # Weitere Dallas-Sensoren: Abschnitt kopieren (dallas_3 ... dallas_16)

  thermostat_base: !include ../shared/Thermostate.yaml

  thermostat1: !include
    file: ../packages/heating/thermostat_template.yaml
    vars:
      thermostat_id: 1
      thermostat_name: "Thermostat 1"              # Aendern
      thermostat_fallback_sensor: slot1_temperature  # Aendern: slot_id + _temperature
      thermostat_fallback_humidity_sensor: slot1_humidity
      thermostat_valve_switch: DO1                  # Aendern: DO1..DO16
      Thermostat_external_sensor_timeout: "900"

  # Weitere Thermostate: Abschnitt kopieren und thermostat_id erhoehen

dashboard_import:
  package_import_url: github://kwittwer/esphome_kfw_lib/B16M/profiles/profile_mix_wifi.yaml@main
  import_full_config: false

api:
  reboot_timeout: 6h

ota:
  - platform: esphome
