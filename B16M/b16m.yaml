  thermostat_base: !include Peripherie/Thermostate.yaml
  thermostat1: !include
    file: B16M_components/thermostat_template.yaml
    vars:
      thermostat_id: 1
      thermostat_name: "Temp1"
      thermostat_fallback_sensor: Temp2_temperature
      thermostat_fallback_humidity_sensor: Temp2_humidity
      thermostat_valve_switch: DO1
      Thermostat_external_sensor_timeout: "900"
  thermostat2: !include
    file: B16M_components/thermostat_template.yaml
    vars:
      thermostat_id: 2
      thermostat_name: "Temp2"
      thermostat_fallback_sensor: Temp1_temperature
      thermostat_fallback_humidity_sensor: Temp1_humidity
      thermostat_valve_switch: DO2
      Thermostat_external_sensor_timeout: "900"
  thermostat3: !include
