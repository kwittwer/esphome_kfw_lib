external_components:
  - source:
      type: local
      path: B16M_components/components
    components: [dummy_thermostat]



switch:
  - platform: template
    name: "Lokale Heizregelung"
    id: local_control_switch
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: template
    name: "Heizung Hauptschalter"
    id: heating_master_switch
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    optimistic: true

binary_sensor:
- platform: template
  name: "Heizung Hauptschalter"
  id: hw_master_sw
  entity_category: diagnostic
  lambda: |-
    if (id(DI1).state == true) {
    return true;
    } else {
    return false;
    }

- platform: template
  name: "Thermostat1 Fallback active - Temperature Sensor"
  id: t1_fallback_temp_active
  entity_category: diagnostic
  lambda: |-
    return id(thermostat1).is_using_fallback_temperature();

