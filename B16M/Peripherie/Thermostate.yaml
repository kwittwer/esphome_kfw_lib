climate:
  - platform: dummy_thermostat
    name: "Thermostat1"
    id: thermostat1
    fallback_sensor: ${T2_name}_temperature                 # ✅ Fallback (lokal)
    sensor_timeout: ${Thermostat_external_sensor_timeout} # 5Min und 10 sec
    fallback_humidity_sensor: ${T2_name}_humidity     # ✅ Fallback (lokal)
    humidity_sensor_timeout: ${Thermostat_external_sensor_timeout} # 5Min und 10 sec
    valve_switch: DO1
    valve_update_timeout: 300  # 60sec
    valve_control_enabled: !lambda |-
      return(id(heating_master_switch).state & id(hw_master_sw).state);
    use_local_valve_control: !lambda |-
      return id(local_control_switch).state;
    heating_deadband: 0.5      # Startet Heizung bei T_ist < T_soll - 0.5°C
    heating_overrun: 0.1       # Stoppt Heizung bei T_ist >= T_soll + 0.5°C
    visual:
      min_temperature: 15.0
      max_temperature: 30.0
      temperature_step:
        target_temperature: 0.5
        current_temperature: 0.1

