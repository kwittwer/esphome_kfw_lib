# ---------- EINGÄNGE (sichtbar als Template + HW intern, invertierbar) ----------
binary_sensor:
  # Sichtbare logische Inputs (Template)
  - platform: gpio
    id: page_button
    name: "Display Page Button"
    pin:
      number: 0
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      - lambda: |-
          id(page_index) = (id(page_index) % 4) + 1;
          id(last_page_ms) = millis();
      - script.execute: show_current_page

  - platform: template
    id: in01
    name: "b16m-input01"
  - platform: template
    id: in02
    name: "b16m-input02"
  - platform: template
    id: in03
    name: "b16m-input03"
  - platform: template
    id: in04
    name: "b16m-input04"
  - platform: template
    id: in05
    name: "b16m-input05"
  - platform: template
    id: in06
    name: "b16m-input06"
  - platform: template
    id: in07
    name: "b16m-input07"
  - platform: template
    id: in08
    name: "b16m-input08"
  - platform: template
    id: in09
    name: "b16m-input09"
  - platform: template
    id: in10
    name: "b16m-input10"
  - platform: template
    id: in11
    name: "b16m-input11"
  - platform: template
    id: in12
    name: "b16m-input12"
  - platform: template
    id: in13
    name: "b16m-input13"
  - platform: template
    id: in14
    name: "b16m-input14"
  - platform: template
    id: in15
    name: "b16m-input15"
  - platform: template
    id: in16
    name: "b16m-input16"

  # Interne HW Inputs (PCF8575) – nicht invertiert; Publish logischer Zustand
  - platform: gpio
    id: in01_hw
    internal: true
    pin: { pcf8574: pcf8574_hub_in_1, number: 0, mode: INPUT }
    on_state:
      - lambda: |-
          bool logical = id(in01_inv) ? !x : x;
          id(in01).publish_state(logical);
      - mqtt.publish: 
          topic: ${mqtt_prefix}/input/01/state
          payload: !lambda 'return (id(in01_inv)?(!x):x) ? "ON":"OFF";'
          retain: true
  # ... identisch für in02_hw..in16_hw (Nummer und *_inv/Topic anpassen)
  - platform: template
    id: w1_io40
    name: "b16m-W1-io40"
  - platform: template
    id: w1_io15
    name: "b16m-W1-io15"
  - platform: template
    id: w1_io48
    name: "b16m-W1-io48"
  - platform: template
    id: w1_io47
    name: "b16m-W1-io47"

  # HW Binary (intern), Publish nur bei Modus Binary
  - platform: gpio
    id: io40_bin_hw
    internal: true
    pin: { number: 40, mode: INPUT }
    on_state:
      - if:
          condition: { lambda: 'return id(io40_mode_val)==0;' }
          then:
            - lambda: |-
                bool logical = id(io40_inv) ? !x : x;
                id(w1_io40).publish_state(logical);
            - mqtt.publish: 
                topic: ${mqtt_prefix}/w1/io40/state 
                payload: !lambda 'return (id(io40_inv)?(!x):x) ? "ON":"OFF";'
                retain: true

  - platform: gpio
    id: io15_bin_hw
    internal: true
    pin: { number: 15, mode: INPUT }
    on_state:
      - if:
          condition: { lambda: 'return id(io15_mode_val)==0;' }
          then:
            - lambda: |-
                bool logical = id(io15_inv) ? !x : x;
                id(w1_io15).publish_state(logical);
            - mqtt.publish: 
                topic: ${mqtt_prefix}/w1/io15/state
                payload: !lambda 'return (id(io15_inv)?(!x):x) ? "ON":"OFF";'
                retain: true 

  - platform: gpio
