substitutions:
  dev_name: b16m
  mqtt_prefix: b16m

esphome:
  name: ${dev_name}
  friendly_name: ${dev_name}
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then:
      # Modusankündigung
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/io40/mode    
          payload: !lambda 'return id(io40_mode_select).state.c_str();'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/io15/mode    
          payload: !lambda 'return id(io15_mode_select).state.c_str();'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/io48/mode    
          payload: !lambda 'return id(io48_mode_select).state.c_str();'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/io47/mode    
          payload: !lambda 'return id(io47_mode_select).state.c_str();'    
          retain: true    
      # Analog-Konfig ankündigen
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a0/update_interval    
          payload: !lambda 'char b[16]; sprintf(b    id(a0_interval_s)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a1/update_interval    
          payload: !lambda 'char b[16]; sprintf(b    id(a1_interval_s)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a2/update_interval    
          payload: !lambda 'char b[16]; sprintf(b    id(a2_interval_s)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a3/update_interval    
          payload: !lambda 'char b[16]; sprintf(b    id(a3_interval_s)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a0/map/x1    
          payload: !lambda 'char b[24]; sprintf(b    id(a0_map_x1)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a0/map/y1    
          payload: !lambda 'char b[24]; sprintf(b    id(a0_map_y1)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a0/map/x2    
          payload: !lambda 'char b[24]; sprintf(b    id(a0_map_x2)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a0/map/y2    
          payload: !lambda 'char b[24]; sprintf(b    id(a0_map_y2)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a1/map/x1    
          payload: !lambda 'char b[24]; sprintf(b    id(a1_map_x1)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a1/map/y1    
          payload: !lambda 'char b[24]; sprintf(b    id(a1_map_y1)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a1/map/x2    
          payload: !lambda 'char b[24]; sprintf(b    id(a1_map_x2)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a1/map/y2    
          payload: !lambda 'char b[24]; sprintf(b    id(a1_map_y2)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a2/map/x1    
          payload: !lambda 'char b[24]; sprintf(b    id(a2_map_x1)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a2/map/y1    
          payload: !lambda 'char b[24]; sprintf(b    id(a2_map_y1)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a2/map/x2    
          payload: !lambda 'char b[24]; sprintf(b    id(a2_map_x2)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a2/map/y2    
          payload: !lambda 'char b[24]; sprintf(b    id(a2_map_y2)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a3/map/x1    
          payload: !lambda 'char b[24]; sprintf(b    id(a3_map_x1)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a3/map/y1    
          payload: !lambda 'char b[24]; sprintf(b    id(a3_map_y1)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a3/map/x2    
          payload: !lambda 'char b[24]; sprintf(b    id(a3_map_x2)); return std: :string(b);'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/config/analog/a3/map/y2    
          payload: !lambda 'char b[24]; sprintf(b    id(a3_map_y2)); return std: :string(b);'    
          retain: true    
      # Homescreen Defaultzeilen publizieren (falls noch leer)
      - mqtt.publish:    
          topic: ${mqtt_prefix}/display/home/line1    
          payload: !lambda 'return id(home_line1).state;'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/display/home/line2    
          payload: !lambda 'return id(home_line2).state;'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/display/home/line3    
          payload: !lambda 'return id(home_line3).state;'    
          retain: true
      - mqtt.publish:    
          topic: ${mqtt_prefix}/display/home/line4    
          payload: !lambda 'return id(home_line4).state;'    
          retain: true
      # Display: starte auf Seite 1
      - lambda: |-
          id(page_index)=1; 
          id(last_page_ms)=millis();
          id(oled).show_page(id(page_home));

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# ===================== LOGGER / API / MQTT =====================
logger:
  hardware_uart: USB_SERIAL_JTAG



api:
  # HA-Verbindungsstatus in Global setzen
  id: api_server
  encryption:
    key: "GvfbcydpffzMhFZJ9Jm59Vv86K8pZFtVq3BzSGj5Rek="
  on_client_connected:
    then:
      - lambda: 'id(ha_connected) = true;'
  on_client_disconnected:
    then:
      - lambda: 'id(ha_connected) = false;'
ota:
  - platform: esphome
    password: "ac6feaa1334ddf6f9876e1f3203074fd"

mqtt:
  id: mqtt_client
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password
  topic_prefix: ${mqtt_prefix}
  discovery: false
  reboot_timeout: 0s
  on_connect:
    then:
      - lambda: 'id(mqtt_is_connected) = true;'
      # Announce aktueller Display-Homescreen-Text

      - mqtt.publish:
          topic: ${mqtt_prefix}/display/home/line1
          payload: !lambda 'return id(home_line1).c_str();'
          retain: true
      - mqtt.publish:
          topic: ${mqtt_prefix}/display/home/line2
          payload: !lambda 'return id(home_line2).c_str();'
          retain: true

      - mqtt.publish:
          topic: ${mqtt_prefix}/display/home/line3
          payload: !lambda 'return id(home_line3).c_str();'
          retain: true

      - mqtt.publish:
          topic: ${mqtt_prefix}/display/home/line4
          payload: !lambda 'return id(home_line4).c_str();'
          retain: true

  on_disconnect:
    then:
      - lambda: 'id(mqtt_is_connected) = false;'

  # ===== Custom MQTT-Set Topics =====
  on_message:
    # --------- 16 digitale Ausgänge setzen -----------
    - topic: ${mqtt_prefix}/output/01/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out01], else: [switch.turn_off: out01] }
    - topic: ${mqtt_prefix}/output/02/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out02], else: [switch.turn_off: out02] }
    - topic: ${mqtt_prefix}/output/03/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out03], else: [switch.turn_off: out03] }
    - topic: ${mqtt_prefix}/output/04/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out04], else: [switch.turn_off: out04] }
    - topic: ${mqtt_prefix}/output/05/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out05], else: [switch.turn_off: out05] }
    - topic: ${mqtt_prefix}/output/06/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out06], else: [switch.turn_off: out06] }
    - topic: ${mqtt_prefix}/output/07/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out07], else: [switch.turn_off: out07] }
    - topic: ${mqtt_prefix}/output/08/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out08], else: [switch.turn_off: out08] }
    - topic: ${mqtt_prefix}/output/09/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out09], else: [switch.turn_off: out09] }
    - topic: ${mqtt_prefix}/output/10/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out10], else: [switch.turn_off: out10] }
    - topic: ${mqtt_prefix}/output/11/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out11], else: [switch.turn_off: out11] }
    - topic: ${mqtt_prefix}/output/12/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out12], else: [switch.turn_off: out12] }
    - topic: ${mqtt_prefix}/output/13/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out13], else: [switch.turn_off: out13] }
    - topic: ${mqtt_prefix}/output/14/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out14], else: [switch.turn_off: out14] }
    - topic: ${mqtt_prefix}/output/15/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out15], else: [switch.turn_off: out15] }
    - topic: ${mqtt_prefix}/output/16/set
      then:
        - if: { condition: { lambda: 'return (payload == "ON" || payload == "on" || payload == "1");' }, then: [switch.turn_on: out16], else: [switch.turn_off: out16] }

    # RS485 Frame senden
    - topic: ${mqtt_prefix}/rs485/button/set
      then:
        # - switch.turn_on: rs485_button

    # IO40/15/48/47 - Modus per MQTT
    - topic: ${mqtt_prefix}/config/io40/mode/set
      then:
        - select.set:
            id: io40_mode_select
            option: !lambda |-
              std::string s(payload);
              if (s == "Binary" || s == "binary") return std::string("Binary");
              if (s == "DHT22"  || s == "dht22")  return std::string("DHT22");
              if (s == "Dallas" || s == "dallas") return std::string("Dallas");
              return id(io40_mode_select).state.c_str();

    - topic: ${mqtt_prefix}/config/io15/mode/set
      then:
        - select.set:
            id: io15_mode_select
            option: !lambda |-
              std::string s(payload);
              if (s == "Binary" || s == "binary") return std::string("Binary");
              if (s == "DHT22"  || s == "dht22")  return std::string("DHT22");
              if (s == "Dallas" || s == "dallas") return std::string("Dallas");
              return id(io15_mode_select).state.c_str();

    - topic: ${mqtt_prefix}/config/io48/mode/set
      then:
        - select.set:
            id: io48_mode_select
            option: !lambda |-
              std::string s(payload);
              if (s == "Binary" || s == "binary") return std::string("Binary");
              if (s == "DHT22"  || s == "dht22")  return std::string("DHT22");
              if (s == "Dallas" || s == "dallas") return std::string("Dallas");
              return id(io48_mode_select).state.c_str();

    - topic: ${mqtt_prefix}/config/io47/mode/set
      then:
        - select.set:
            id: io47_mode_select
            option: !lambda |-
              std::string s(payload);
              if (s == "Binary" || s == "binary") return std::string("Binary");
              if (s == "DHT22"  || s == "dht22")  return std::string("DHT22");
              if (s == "Dallas" || s == "dallas") return std::string("Dallas");
              return id(io47_mode_select).state.c_str();

    # Display Page 1: Homescreen Texte per MQTT setzen
    - topic: ${mqtt_prefix}/display/home/line1/set
      then:
        - lambda: 'id(home_line1) = std::string(payload);'
        - mqtt.publish:
            topic: ${mqtt_prefix}/display/home/line1
            payload: !lambda 'return id(home_line1).c_str();'
            retain: true

        - mqtt.publish:
            topic: ${mqtt_prefix}/display/home/line2
            payload: !lambda 'return id(home_line2).c_str();'
            retain: true

        - mqtt.publish:
            topic: ${mqtt_prefix}/display/home/line3
            payload: !lambda 'return id(home_line3).c_str();'
            retain: true

        - mqtt.publish:
            topic: ${mqtt_prefix}/display/home/line4
            payload: !lambda 'return id(home_line4).c_str();'
            retain: true


ethernet:
  type: W5500
  clk_pin: GPIO42
  mosi_pin: GPIO43
  miso_pin: GPIO44
  cs_pin: GPIO41
  interrupt_pin: GPIO2
  reset_pin: GPIO1

# ===================== I2C / IO-Expander =====================
i2c:
  - id: bus_a
    sda: 38
    scl: 39
    scan: true
    frequency: 400kHz

pcf8574:
  - id: pcf8574_hub_out_1
    i2c_id: bus_a
    address: 0x25
    pcf8575: true

  - id: pcf8574_hub_in_1
    i2c_id: bus_a
    address: 0x24
    pcf8575: true

# ===================== UART / RS485-Button =====================
uart:
  - id: uart_1
    baud_rate: 9600
    debug:
      direction: BOTH
      dummy_receiver: true
      after:
        timeout: 10ms
    tx_pin: 18
    rx_pin: 8

switch:
  # - platform: uart
  #   id: rs485_button
  #   name: "RS485 Button"
  #   uart_id: uart_1
  #   data: [0x11, 0x22, 0x33, 0x44, 0x55]
  #   on_turn_on:
  #     - mqtt.publish:
  #       topic: ${mqtt_prefix}/rs485/button/state
  #       payload: "TRIGGERED"
  #     - delay: 50ms
  #     - switch.turn_off: rs485_button
  - platform: template
    id: cfg_inv_out01
    name: "Config Invert Output 01"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    lambda: 'return id(out01_inv);'
    turn_on_action:
      - lambda: 'id(out01_inv)=true;'
      - mqtt.publish: 
          topic: ${mqtt_prefix}/config/output/01/invert
          payload: "Inverted"
          retain: true
    turn_off_action:
      - lambda: 'id(out01_inv)=false;'
      - mqtt.publish: 
          topic: ${mqtt_prefix}/config/output/01/invert
          payload: "Normal"
          retain: true
  - platform: template
    id: out01
    name: "b16m-output01"
    lambda: 'return id(out01_state);'
    turn_on_action:
      - lambda: |-
          id(out01_state) = true;
          const bool phys_on = id(out01_inv) ? false : true;
          if (phys_on) id(out01_hw).turn_on(); else id(out01_hw).turn_off();
      - mqtt.publish: 
          topic: ${mqtt_prefix}/output/01/state
          payload: "ON"
          retain: true
    turn_off_action:
      - lambda: |-
          id(out01_state) = false;
          const bool phys_on = id(out01_inv) ? true : false;
          if (phys_on) id(out01_hw).turn_on(); else id(out01_hw).turn_off();
      - mqtt.publish: 
          topic: ${mqtt_prefix}/output/01/state
          payload: "OFF"
          retain: true 

  # ... identisch für out02..out16 mit jeweiligem *_inv, *_state, *_hw und Topic
  - platform: template
    id: cfg_inv_in01
    name: "Config Invert Input 01"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    lambda: 'return id(in01_inv);'
    turn_on_action:
      - lambda: 'id(in01_inv)=true;'
      - mqtt.publish: 
          topic: ${mqtt_prefix}/config/input/01/invert
          payload: "Inverted"
          retain: true
    turn_off_action:
      - lambda: 'id(in01_inv)=false;'
      - mqtt.publish: 
          topic: ${mqtt_prefix}/config/input/01/invert
          payload: "Normal"
          retain: true

