# ---------- Umschaltbare Pins (Binary/DHT/Dallas) ----------
# Sichtbare Binarys (für Binary-Modus)
# binary_sensor:

# ---------- DHT22 (nur aktiv bei Modus=DHT22, manuell getriggert) ----------
sensor:
  - platform: dht
    id: dht_io40
    pin: 40
    model: DHT22
    update_interval: never
    temperature:
      id: dht_io40_t
      internal: true
      on_value:
        - if:
            condition: { lambda: 'return id(io40_mode_val)==1;' }
            then:
              - mqtt.publish_json:
                  topic: ${mqtt_prefix}/w1/io40/dht22
                  payload: |-
                    root["temperature"]=x; root["unit"]="°C";
                  retain: true
    humidity:
      id: dht_io40_h
      internal: true
      on_value:
        - if:
            condition: { lambda: 'return id(io40_mode_val)==1;' }
            then:
              - mqtt.publish_json:
                  topic: ${mqtt_prefix}/w1/io40/dht22
                  payload: |-
                    root["humidity"]=x; root["unit_h"]="%";
                  retain: true

  - platform: dht
    id: dht_io15
    pin: 15
    model: DHT22
