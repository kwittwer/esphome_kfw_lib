  # A0 (Volt)
  - platform: ads1115
    id: ads_a0
    multiplexer: A0_GND
    gain: 6.144
    resolution: 16_BITS
    update_interval: 1s
    on_value:
      - if:
          condition:
            lambda: |-
              uint32_t now=millis();
              uint32_t iv=(uint32_t)(id(a0_interval_s)*1000.0f);
              if (iv<200) iv=200;
              return (now - id(a0_last_ms)) >= iv;
          then:
            - lambda: 'id(a0_last_ms)=millis();'
            - mqtt.publish:
                topic: ${mqtt_prefix}/analog/a0/raw_v
                payload: !lambda 'char b[24]; snprintf(b,sizeof(b),"%.5f", x); return std::string(b);'
                retain: true
            - mqtt.publish:
                topic: ${mqtt_prefix}/analog/a0
                payload: !lambda |-
                  float v=x; float dx=id(a0_map_x2)-id(a0_map_x1);
                  float y=v;
                  if (fabsf(dx)>1e-9f) y = id(a0_map_y1) + (v - id(a0_map_x1)) * (id(a0_map_y2)-id(a0_map_y1)) / dx;
                  char b[24]; snprintf(b,sizeof(b),"%.5f", y); return std::string(b);
                retain: true

  # A1 (Volt)
  - platform: ads1115
    id: ads_a1
    multiplexer: A1_GND
    gain: 6.144
    resolution: 16_BITS
    update_interval: 1s
    on_value:
      - if:
          condition:
            lambda: |-
              uint32_t now=millis();
              uint32_t iv=(uint32_t)(id(a1_interval_s)*1000.0f);
              if (iv<200) iv=200;
              return (now - id(a1_last_ms)) >= iv;
          then:
            - lambda: 'id(a1_last_ms)=millis();'
            - mqtt.publish:
                topic: ${mqtt_prefix}/analog/a1/raw_v
                payload: !lambda 'char b[24]; snprintf(b,sizeof(b),"%.5f", x); return std::string(b);'
                retain: true
            - mqtt.publish:
                topic: ${mqtt_prefix}/analog/a1
                payload: !lambda |-
                  float v=x; float dx=id(a1_map_x2)-id(a1_map_x1);
                  float y=v;
                  if (fabsf(dx)>1e-9f) y = id(a1_map_y1) + (v - id(a1_map_x1)) * (id(a1_map_y2)-id(a1_map_y1)) / dx;
                  char b[24]; snprintf(b,sizeof(b),"%.5f", y); return std::string(b);
                retain: true

  # A2 (Strom: V -> mA, dann Mapping auf mA)
  - platform: ads1115
    id: ads_a2
    multiplexer: A2_GND
    gain: 6.144
    resolution: 16_BITS
    update_interval: 1s
    on_value:
      - if:
          condition:
            lambda: |-
              uint32_t now=millis();
              uint32_t iv=(uint32_t)(id(a2_interval_s)*1000.0f);
              if (iv<200) iv=200;
              return (now - id(a2_last_ms)) >= iv;
          then:
            - lambda: 'id(a2_last_ms)=millis();'
            - mqtt.publish:
                topic: ${mqtt_prefix}/analog/a2/raw_v
                payload: !lambda 'char b[24]; snprintf(b,sizeof(b),"%.5f", x); return std::string(b);'
                retain: true
            - mqtt.publish:
                topic: ${mqtt_prefix}/analog/a2/current_ma
                payload: !lambda |-
                  float ma = x * 4.0f; char b[24]; snprintf(b,sizeof(b),"%.5f", ma); return std::string(b);
                retain: true
            - mqtt.publish:
                topic: ${mqtt_prefix}/analog/a2
                payload: !lambda |-
                  float ma = x * 4.0f; float dx=id(a2_map_x2)-id(a2_map_x1);
                  float y = ma;
                  if (fabsf(dx)>1e-9f) y = id(a2_map_y1) + (ma - id(a2_map_x1)) * (id(a2_map_y2)-id(a2_map_y1)) / dx;
                  char b[24]; snprintf(b,sizeof(b),"%.5f", y); return std::string(b);
                retain: true

  # A3 (Strom)
  - platform: ads1115
    id: ads_a3
    multiplexer: A3_GND
    gain: 6.144
    resolution: 16_BITS
    update_interval: 1s
    on_value:
      - if:
          condition:
            lambda: |-
              uint32_t now=millis();
              uint32_t iv=(uint32_t)(id(a3_interval_s)*1000.0f);
              if (iv<200) iv=200;
              return (now - id(a3_last_ms)) >= iv;
          then:
