# ---------- Fonts für OLED ----------
font:
  - id: font_small
    file: "gfonts://Roboto Mono"
    size: 10
  - id: font_medium
    file: "gfonts://Roboto Mono"
    size: 12
  - id: font_large
    file: "gfonts://Roboto"
    size: 14


# ---------- OLED Display mit Pages ----------
display:
  - platform: ssd1306_i2c
    id: oled
    i2c_id: bus_a
    model: "SSD1306 128x64"
    address: 0x3C
    update_interval: 500ms
    pages:
      # Page 1: Homescreen
      - id: page_home
        lambda: |-
          it.printf(0, 0,  id(font_medium), "B16M");
          it.printf(0, 16, id(font_small), "%s", id(home_line1).state.c_str());
          it.printf(0, 28, id(font_small), "%s", id(home_line2).state.c_str());
          it.printf(0, 40, id(font_small), "%s", id(home_line3).state.c_str());
          it.printf(0, 52, id(font_small), "%s", id(home_line4).state.c_str());

      # Page 2: Temperatur-Sensordaten
      - id: page_temp
        lambda: |-
          it.printf(0, 0, id(font_medium), "Temperaturen");
          // IO40
          if (id(io40_mode_val)==1) { // DHT
            it.printf(0, 16, id(font_small), "40 DHT %5.1fC %4.0f%%", id(dht_io40_t).state, id(dht_io40_h).state);
          } else if (id(io40_mode_val)==2) { // Dallas
            it.printf(0, 16, id(font_small), "40 DS  %5.1fC", id(dallas_io40).state);
          } else {
            it.printf(0, 16, id(font_small), "40 --");
          }
          // IO15
          if (id(io15_mode_val)==1) {
            it.printf(0, 28, id(font_small), "15 DHT %5.1fC %4.0f%%", id(dht_io15_t).state, id(dht_io15_h).state);
          } else if (id(io15_mode_val)==2) {
            it.printf(0, 28, id(font_small), "15 DS  %5.1fC", id(dallas_io15).state);
          } else {
            it.printf(0, 28, id(font_small), "15 --");
          }
          // IO48
          if (id(io48_mode_val)==1) {
            it.printf(0, 40, id(font_small), "48 DHT %5.1fC %4.0f%%", id(dht_io48_t).state, id(dht_io48_h).state);
          } else if (id(io48_mode_val)==2) {
            it.printf(0, 40, id(font_small), "48 DS  %5.1fC", id(dallas_io48).state);
          } else {
            it.printf(0, 40, id(font_small), "48 --");
          }
          // IO47
          if (id(io47_mode_val)==1) {
            it.printf(0, 52, id(font_small), "47 DHT %5.1fC %4.0f%%", id(dht_io47_t).state, id(dht_io47_h).state);
          } else if (id(io47_mode_val)==2) {
            it.printf(0, 52, id(font_small), "47 DS  %5.1fC", id(dallas_io47).state);
          } else {
            it.printf(0, 52, id(font_small), "47 --");
          }

      # Page 3: Analogdaten
      - id: page_analog
        lambda: |-
          it.printf(0, 0, id(font_medium), "Analog");
          // Hinweise: Rohwerte werden per MQTT publiziert. Hier Anzeige via Lambdas unten:
          // Zur Anzeige nutzen wir 'App.get_component' nicht; stattdessen merken wir die letzte MQTT-Payload?
          // Hier einfache Darstellung: "nutze letzte berechnete Werte aus MQTT nicht direkt" -> statisch als Platzhalter
          // Da die Sensorzustände hier nicht als eigene IDs gespeichert sind, empfehlen wir optional Template-Sensoren anzulegen.
          // Kompakte Anzeige:
          it.printf(0, 16, id(font_small), "A0 raw/m:  via MQTT");
          it.printf(0, 28, id(font_small), "A1 raw/m:  via MQTT");
          it.printf(0, 40, id(font_small), "A2 V/mA/m: via MQTT");
          it.printf(0, 52, id(font_small), "A3 V/mA/m: via MQTT");

      # Page 4: Verbindungsstatus
      - id: page_status
        lambda: |-
          bool ha_ok = id(api_server).is_connected();
          bool mq_ok = id(mqtt_client).is_connected();
          it.printf(0, 0,  id(font_medium), "Netzwerk");
          it.printf(0, 16, id(font_small), "IP: %s", id(ip_addr).state.c_str());
          it.printf(0, 28, id(font_small), "HA: %s", ha_ok ? "verbunden" : "nicht");
          it.printf(0, 40, id(font_small), "MQTT: %s", mq_ok ? "verbunden" : "nicht");
          it.printf(0, 52, id(font_small), "MAC: %s", id(mac_addr).state.c_str())

# ---------- Script: Seiten anzeigen gemäß page_index ----------
script:
  - id: show_current_page
    mode: queued
    then:
      - lambda: |-
          switch (id(page_index)) {
            case 1: id(oled).show_page(id(page_home)); break;
            case 2: id(oled).show_page(id(page_temp)); break;
            case 3: id(oled).show_page(id(page_analog)); break;
            case 4: id(oled).show_page(id(page_status)); break;
            default: id(oled).show_page(id(page_home)); id(page_index)=1; break;
          }
# ---------- Webserver (optional) ----------
web_server:
  port: 80

# ---------- On Boot: Status & Konfig announcen + Startseite ----------
