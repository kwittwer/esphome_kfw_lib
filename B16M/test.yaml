# ---------- SELECTS: Moduswahl IO40/15/48/47 ----------
select:
  - platform: template
    id: io40_mode_select
    name: "IO40 Modus"
    optimistic: true
    options: [Binary, DHT22, Dallas]
    initial_option: "Binary"  # Fester Wert, KEIN Lambda!
    set_action:
      - lambda: |-
          if (x=="DHT22") id(io40_mode_val)=1;
          else if (x=="Dallas") id(io40_mode_val)=2;
          else id(io40_mode_val)=0;
      - mqtt.publish: 
          topic: ${mqtt_prefix}/config/io40/mode
          payload: !lambda 'return id(io40_mode_select).state.c_str();'
          retain: true 

  - platform: template
    id: io15_mode_select
