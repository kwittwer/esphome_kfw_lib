  - { id: io47_mode_val, type: int, restore_value: true, initial_value: '0' }
  - { id: io40_inv, type: bool, restore_value: true, initial_value: 'true' }
  - { id: io15_inv, type: bool, restore_value: true, initial_value: 'true' }
  - { id: io48_inv, type: bool, restore_value: true, initial_value: 'true' }
  - { id: io47_inv, type: bool, restore_value: true, initial_value: 'true' }

  # Analoge Kanäle: Intervalle [s]
  - { id: a0_interval_s, type: float, restore_value: true, initial_value: '10' }
  - { id: a1_interval_s, type: float, restore_value: true, initial_value: '10' }
  - { id: a2_interval_s, type: float, restore_value: true, initial_value: '10' }
  - { id: a3_interval_s, type: float, restore_value: true, initial_value: '10' }

  # Analoge Kanäle: letzte Publish-Zeitpunkte
  - { id: a0_last_ms, type: uint32_t, restore_value: false, initial_value: '0' }
  - { id: a1_last_ms, type: uint32_t, restore_value: false, initial_value: '0' }
  - { id: a2_last_ms, type: uint32_t, restore_value: false, initial_value: '0' }
  - { id: a3_last_ms, type: uint32_t, restore_value: false, initial_value: '0' }

  # Mappingpunkte (x=Eingabe, y=Ziel)
  # A0/A1: x in Volt
  - { id: a0_map_x1, type: float, restore_value: true, initial_value: '0' }
  - { id: a0_map_y1, type: float, restore_value: true, initial_value: '0' }
  - { id: a0_map_x2, type: float, restore_value: true, initial_value: '10' }
  - { id: a0_map_y2, type: float, restore_value: true, initial_value: '10' }
  - { id: a1_map_x1, type: float, restore_value: true, initial_value: '0' }
  - { id: a1_map_y1, type: float, restore_value: true, initial_value: '0' }
  - { id: a1_map_x2, type: float, restore_value: true, initial_value: '10' }
  - { id: a1_map_y2, type: float, restore_value: true, initial_value: '10' }

  # A2/A3: x in mA (intern V->mA via 1V=4mA)
  - { id: a2_map_x1, type: float, restore_value: true, initial_value: '0' }
  - { id: a2_map_y1, type: float, restore_value: true, initial_value: '0' }
  - { id: a2_map_x2, type: float, restore_value: true, initial_value: '20' }
  - { id: a2_map_y2, type: float, restore_value: true, initial_value: '20' }
  - { id: a3_map_x1, type: float, restore_value: true, initial_value: '0' }
  - { id: a3_map_y1, type: float, restore_value: true, initial_value: '0' }
  - { id: a3_map_x2, type: float, restore_value: true, initial_value: '20' }
  - { id: a3_map_y2, type: float, restore_value: true, initial_value: '20' }

  # Display: Page-Steuerung
  - { id: page_index, type: int, restore_value: false, initial_value: '1' }
  - { id: last_page_ms, type: uint32_t, restore_value: false, initial_value: '0' }

