            - mqtt.publish:
                topic: ${mqtt_prefix}/analog/a3/raw_v
                payload: !lambda 'char b[24]; snprintf(b,sizeof(b),"%.5f", x); return std::string(b);'
                retain: true
            - mqtt.publish:
                topic: ${mqtt_prefix}/analog/a3/current_ma
                payload: !lambda |-
                  float ma = x * 4.0f; char b[24]; snprintf(b,sizeof(b),"%.5f", ma); return std::string(b);
                retain: true
            - mqtt.publish:
                topic: ${mqtt_prefix}/analog/a3
                payload: !lambda |-
                  float ma = x * 4.0f; float dx=id(a3_map_x2)-id(a3_map_x1);
                  float y = ma;
                  if (fabsf(dx)>1e-9f) y = id(a3_map_y1) + (ma - id(a3_map_x1)) * (id(a3_map_y2)-id(a3_map_y1)) / dx;
                  char b[24]; snprintf(b,sizeof(b),"%.5f", y); return std::string(b);
                retain: true

# ---------- Intervall-Trigger für DHT/Dallas ----------
interval:
  - interval: 10s
    then:
      # IO40
      - if: { condition: { lambda: 'return id(io40_mode_val)==1;' }, then: [ component.update: dht_io40 ] }
      - if: { condition: { lambda: 'return id(io40_mode_val)==2;' }, then: [ component.update: dallas_io40 ] }
      # IO15
      - if: { condition: { lambda: 'return id(io15_mode_val)==1;' }, then: [ component.update: dht_io15 ] }
      - if: { condition: { lambda: 'return id(io15_mode_val)==2;' }, then: [ component.update: dallas_io15 ] }
      # IO48
      - if: { condition: { lambda: 'return id(io48_mode_val)==1;' }, then: [ component.update: dht_io48 ] }
      - if: { condition: { lambda: 'return id(io48_mode_val)==2;' }, then: [ component.update: dallas_io48 ] }
      # IO47
      - if: { condition: { lambda: 'return id(io47_mode_val)==1;' }, then: [ component.update: dht_io47 ] }
      - if: { condition: { lambda: 'return id(io47_mode_val)==2;' }, then: [ component.update: dallas_io47 ] }
  - interval: 1s
    then:
      - lambda: |-
          uint32_t now = millis();
          if (id(page_index)!=1 && (now - id(last_page_ms) > 60000)) {
            id(page_index)=1;
            id(oled).show_page(id(page_home));
            id(last_page_ms)=now;
          }

