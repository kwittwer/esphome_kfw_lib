# ============================================
# B16M Geraete-Profil – Ethernet (W5500)
#
# Dieses Profil repraesentiert die reine Hardware des KinCony B16M.
# Es enthaelt KEINE Anwendungslogik (keine Sensoren, keine Thermostate).
#
# Enthalten:
#   - ESP32-S3, PSRAM, Web-Server
#   - 16x Digital Input  (DI1–DI16)
#   - 16x Digital Output (DO1–DO16)
#   - 4x Analog Input    (AI1–AI4 via ADS1115)
#   - OLED Display (SSD1306, 128x64)
#   - RTC (DS1307)
#   - Netzwerk: Ethernet W5500 (Standard-B16M Pins)
#
# Nicht enthalten (separat hinzufuegen):
#   - Sensor-Slots (DHT, Dallas)
#   - Thermostate, Heizungslogik
#   - Anwendungsspezifische Packages
#
# Verwendung als Wiederverwendbare Basis:
#   Nach dem Import im ESPHome Dashboard entsteht eine lokale YAML,
#   die dieses Profil als GitHub-Package referenziert. Dort fuegest du
#   dann deine anwendungsspezifischen Packages hinzu.
#
# Import-Link:
#   github://kwittwer/esphome_kfw_lib/B16M/profile_device_ethernet.yaml@main
# ============================================

substitutions:
  # ---- Geraet (anpassen!) -------------------------------------------
  device_name: b16m-device           # Aendern: Hostname (Kleinbuchstaben + Bindestrich)
  friendly_name: "B16M Device"       # Aendern: Anzeigename in Home Assistant

packages:
  # Hardware-Basis: ESP32-S3, I2C, 16DI, 16DO, 4AI, Display, RTC
  base: !include
    file: B16M_components/B16M_base.yaml
    vars:
      device_name: ${device_name}
      friendly_name: ${friendly_name}

  # Netzwerk: Ethernet W5500 (Standard-B16M-Pins – nicht aendern)
  network: !include B16M_components/net_ethernet.yaml

dashboard_import:
  package_import_url: github://kwittwer/esphome_kfw_lib/B16M/profile_device_ethernet.yaml@main
  import_full_config: false

# ---- Sicherheit (anpassen!) -----------------------------------------
api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 6h

ota:
  - platform: esphome
    password: !secret ota_pwd
