# ============================================
# B16M Profil B – Dallas One-Wire Bus, Ethernet (W5500)
#
# Passend wenn: Slot 4 (GPIO47) als Dallas Bus genutzt wird
#               und das Geraet per Ethernet (W5500, Standard B16M) verbunden ist.
#
# MUSS angepasst werden:
#   device_name, friendly_name,
#   api.encryption.key, ota.password
#
# Pro Sensor:  dallas_address (aus ESPHome One-Wire Scanner auslesen),
#              sensor_name (beliebig), optional update_interval
# ============================================

substitutions:
  # ---- Geraet -------------------------------------------------------
  device_name: b16m-dallas-eth              # Aendern
  friendly_name: "B16M Dallas Ethernet"     # Aendern

packages:
  base: !include
    file: B16M_components/B16M_base.yaml
    vars:
      device_name: ${device_name}
      friendly_name: ${friendly_name}

  network: !include B16M_components/net_ethernet.yaml

  # Dallas Bus auf Slot 4 (GPIO47) – Pin nicht aendern
  sensor_slot_4: !include
    file: B16M_components/ow_dallas_bus.yaml
    vars:
      dallas_bus_id: ow_bus_1
      dallas_pin: "47"

  # ---- Dallas Sensoren (Adresse + Name anpassen) --------------------
  dallas_1: !include
    file: B16M_components/ow_dallas_sensor.yaml
    vars:
      one_wire_id: ow_bus_1
      dallas_address: 0x0000000000000000   # ERSETZEN: Adresse aus Logs
      dallas_sensor_name: "Sensor 1"       # Aendern
      dallas_sensor_id: dallas_s1
      dallas_update_interval: 10s

  dallas_2: !include
    file: B16M_components/ow_dallas_sensor.yaml
    vars:
      one_wire_id: ow_bus_1
      dallas_address: 0x0000000000000000   # ERSETZEN
      dallas_sensor_name: "Sensor 2"
      dallas_sensor_id: dallas_s2
      dallas_update_interval: 10s

  # Weitere Sensoren: Abschnitt kopieren (dallas_3 ... dallas_16)

  thermostat_base: !include Peripherie/Thermostate.yaml

  thermostat1: !include
    file: B16M_components/thermostat_template.yaml
    vars:
      thermostat_id: 1
      thermostat_name: "Thermostat 1"             # Aendern
      thermostat_fallback_sensor: dallas_s1        # Aendern: dallas_sensor_id
      thermostat_fallback_humidity_sensor: dallas_s1
      thermostat_valve_switch: DO1                 # Aendern: DO1..DO16
      Thermostat_external_sensor_timeout: "900"

dashboard_import:
  package_import_url: github://kwittwer/esphome_kfw_lib/B16M/profile_dallas_ethernet.yaml@main
  import_full_config: false

api:
  encryption:
    key: "GvfbcydpffzMhFZJ9Jm59Vv86K8pZFtVq3BzSGj5Rek="   # ERSETZEN
  reboot_timeout: 6h

ota:
  - platform: esphome
    password: "CHANGE_ME_OTA_PASSWORD"                      # ERSETZEN
