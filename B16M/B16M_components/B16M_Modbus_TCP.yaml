# Beispiel: Schalter über Modbus steuern


# Modbus Coil auf GPIO abbilden
interval:
  - interval: 100ms
    then:
      - lambda: |-
          // Coil 0 -> Relais 1
          bool coil_state = id(modbus_server)->get_coil(0);
          if (coil_state != id(DO6).state) {
            if (coil_state) {
              id(DO6).turn_on();
            } else {
              id(DO6).turn_off();
            }
          }
          
          // Relais Status zurück in Discrete Input schreiben
          id(modbus_server)->set_discrete_input(0, id(DO6).state);