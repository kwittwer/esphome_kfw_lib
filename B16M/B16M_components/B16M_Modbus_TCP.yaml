external_components:
  - source:
      type: local
      path:  B16M_components/components # Pfad zum components/ Ordner
    components: [ modbus_tcp_server ]


# Modbus TCP Server Konfiguration
modbus_tcp_server:
  id: modbus_server
  port: 502
  unit_id: 1
  max_registers: 100
  max_coils: 100
    # Callback wenn Register geschrieben wird
  on_write_register:
    - lambda: |-
        ESP_LOGI("modbus", "Register %d = %d", address, value);
        
        // Beispiel: Register 10 steuert etwas
        if (address == 10 && value > 0) {
          ESP_LOGI("modbus", "Spezielle Aktion für Register 10");
        }
  
  # Callback wenn Coil geschrieben wird
  on_write_coil:
    - lambda: |-
        ESP_LOGI("modbus", "Coil %d = %s", address, value ? "ON" : "OFF");

