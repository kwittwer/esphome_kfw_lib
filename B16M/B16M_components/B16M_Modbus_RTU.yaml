# ============================================
# B16M Modbus Master Configuration
# Lesen und Schreiben von Modbus Slaves
# ============================================

# ============================================
# UART KONFIGURATION
# ============================================

uart:
  - id: uart_1
    tx_pin: GPIO18
    rx_pin: GPIO8
    baud_rate: 19200     # ← Hier ändern
    data_bits: 8         # ← Hier ändern
    stop_bits: 1         # ← Hier ändern
    parity: EVEN         # ← NONE, EVEN, ODD

# ============================================
# MODBUS CONTROLLER
# ============================================

modbus:
  id: modbus_master
  uart_id: uart_1
  send_wait_time: 200ms

