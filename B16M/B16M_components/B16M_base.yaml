# ============================================
# ANALOG INPUTS (AI1–AI4 via ADS1115)
# ============================================
ads1115:
  - address: ${ads_address}

sensor:
  - platform: ads1115
    multiplexer: 'A0_GND'
    gain: 6.144
    resolution: 16_BITS
    id: AI_1
    name: "AI 1"
    internal: false
    unit_of_measurement: "V"
    update_interval: 5s

  - platform: ads1115
    multiplexer: 'A1_GND'
    gain: 6.144
    resolution: 16_BITS
    id: AI_2
    name: "AI 2"
    internal: false
    unit_of_measurement: "V"
    update_interval: 5s

  - platform: ads1115
    multiplexer: 'A2_GND'
    gain: 6.144
    resolution: 16_BITS
    id: AI_3
    unit_of_measurement: "mA"
    accuracy_decimals: 2
    internal: false
    update_interval: 5s
    filters:
      - calibrate_linear:
          - 0.0 -> 0.0
          - 0.59 -> 3.95

  - platform: ads1115
    multiplexer: 'A3_GND'
    name: "Strom AI_4"
    gain: 6.144
    resolution: 16_BITS
    id: AI_4
    unit_of_measurement: "mA"
    accuracy_decimals: 2
    internal: false
    update_interval: 5s
    filters:
      - calibrate_linear:
          - 0.0 -> 0.0
          - 0.59 -> 3.95


