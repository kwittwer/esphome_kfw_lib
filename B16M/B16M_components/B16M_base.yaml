# ============================================
# B16M Base Configuration Template
#
# Konsolidiertes Package-Template fuer den B16M Controller.
# Alle Hardwareeinstellungen sind als Variablen mit Standardwerten definiert.
# Ueberschreibe nur die Werte, die von den Standardwerten abweichen.
#
# Die 4 Sensor-Slots auf GPIO 40/15/48/47 werden bewusst NICHT hier definiert.
# Pro Slot bindest du im Top-Level-Setup genau eines der folgenden Packages ein:
# - B16M_components/ow_dht_slot.yaml
# - B16M_components/ow_dallas_bus.yaml
# Zusaetzliche Dallas Sensoren werden ueber ow_dallas_sensor.yaml angebunden.
#
# Verwendung in einem Setup-File:
#   packages:
#     base: !include
#       file: B16M_components/B16M_base.yaml
#       vars:
#         device_name: mein_b16m
#         friendly_name: "Mein B16M"
#         ...
# ============================================

# ============================================
# DEFAULTS – Standardwerte (überschreibbar via vars:)
# ============================================
defaults:
  # --- Gerät ---
  device_name: b16m
  friendly_name: "B16M Panel"
  version: "2025.12.10.1"
  project_name: "Konrad.B16M_Heimsteuerung"
  timezone: "Europe/Berlin"
  rtc_update_interval: 1h
  web_server_port: "80"

  # --- I2C Bus ---
  i2c_sda_pin: "38"
  i2c_scl_pin: "39"
  i2c_frequency: 400kHz

  # --- I/O Expander Adressen (PCF8575, ADS1115, Display) ---
  pcf_in_address: "0x24"
  pcf_out_address: "0x25"
  ads_address: "0x48"
  display_address: "0x3c"

  # --- Logger / Debug ---
  logger_level: INFO
  debug_update_interval: 10s


# ============================================
# LOGGER
# ============================================
logger:
  level: ${logger_level}

debug:
  update_interval: ${debug_update_interval}


# ============================================
# ESP32-S3
# ============================================
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2026.6.0
  platformio_options:
    board_build.flash_mode: dio
  project:
    name: ${project_name}
    version: "${version}"
  on_boot:
    then:
      ds1307.read_time:

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240MHz
  flash_size: 16MB
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FATFS_LFN_STACK: "y"
    advanced:
      execute_from_psram: true

psram:
  mode: octal
  speed: 80MHz


# ============================================
# WEB SERVER
# ============================================
web_server:
  port: ${web_server_port}
  version: 3


# ============================================
# TIME (DS1307 RTC + Home Assistant)
# ============================================
time:
  - platform: ds1307
    id: rtc_time
    timezone: ${timezone}
    update_interval: ${rtc_update_interval}
  - platform: homeassistant
    timezone: ${timezone}
    on_time_sync:
      then:
        ds1307.write_time:


# ============================================
# I2C BUS
# ============================================
i2c:
  - id: bus_a
    sda: ${i2c_sda_pin}
    scl: ${i2c_scl_pin}
    scan: false
    frequency: ${i2c_frequency}


# ============================================
# I/O EXPANDER (PCF8575)
# ============================================
pcf8574:
  - id: 'pcf8574_hub_in_1'
    i2c_id: bus_a
    address: ${pcf_in_address}
    pcf8575: true

  - id: 'pcf8574_hub_out_1'
    i2c_id: bus_a
    address: ${pcf_out_address}
    pcf8575: true


# ============================================
# DIGITAL INPUTS (DI1–DI16 via PCF8575)
# ============================================
binary_sensor:
