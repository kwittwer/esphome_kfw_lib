# ============================================
# Netzwerk: Ethernet W5500 (SPI) mit DHCP
#
# Verwendung (Standard-B16M-Verdrahtung):
#   packages:
#     network: !include B16M_components/net_ethernet.yaml
#
# Verwendung mit abweichenden Pins:
#   packages:
#     network: !include
#       file: B16M_components/net_ethernet.yaml
#       vars:
#         eth_clk_pin: GPIO42
#         eth_cs_pin: GPIO41
#         ...
# ============================================

defaults:
  eth_clk_pin: GPIO42
  eth_mosi_pin: GPIO43
  eth_miso_pin: GPIO44
  eth_cs_pin: GPIO41
  eth_int_pin: GPIO2
  eth_rst_pin: GPIO1

ethernet:
  type: W5500
  clk_pin: ${eth_clk_pin}
  mosi_pin: ${eth_mosi_pin}
  miso_pin: ${eth_miso_pin}
  cs_pin: ${eth_cs_pin}
  interrupt_pin: ${eth_int_pin}
  reset_pin: ${eth_rst_pin}
